
<!DOCTYPE html>
<html>
<head>

    <title>Chat</title>

    <style>

        body {
            margin: 0;
            font-family: Arial;
            background: #f4f4f4;
        }

        .top {
            background: indigo;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }

        #messages {
            height: calc(100vh - 130px);
            overflow-y: auto;
            padding: 15px;
        }

        .msg {
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 10px;
            max-width: 70%;
        }

        .mine {
            background: indigo;
            color: white;
            margin-left: auto;
        }

        .other {
            background: white;
            color: black;
        }

        .bottom {
            position: fixed;
            bottom: 0;
            width: 100%;
            display: flex;
            gap: 10px;
            padding: 10px;
            background: white;
        }

            .bottom input {
                flex: 1;
                padding: 14px;
                border-radius: 10px;
                border: 1px solid #ccc;
            }

            .bottom button {
                padding: 14px 20px;
                border: none;
                background: indigo;
                color: white;
                border-radius: 10px;
                cursor: pointer;
            }
    </style>

</head>

<body>

    <div class="top">
        Qeja Chat
    </div>

    <div id="messages"></div>

    <div class="bottom">

        <input type="text"
               id="message"
               placeholder="Type message...">

        <button onclick="sendMessage()">
            Send
        </button>

    </div>

    <script>

        const token =
        localStorage.getItem("token");

        const loggedUser =
        JSON.parse(localStorage.getItem("loggedUser"));

        const tenant_id =
        localStorage.getItem("chatTenant");

        const landlord_id =
        loggedUser.id;

        async function loadMessages() {

        const res = await fetch(
        `https://qeja-backend-azkf.onrender.com/chat/${landlord_id}/${tenant_id}`,
        {
        headers: {
        "Authorization": "Bearer " + token
        }
        }
        );

        const data = await res.json();

        const messages =
        document.getElementById("messages");

        messages.innerHTML = "";

        data.chats.forEach(chat => {

        messages.innerHTML += `
        <div class="msg ${chat.sender_role === 'landlord' ? 'mine' : 'other'}">
        ${chat.message}
        </div>
        `;
        });

        messages.scrollTop =
        messages.scrollHeight;
        }

        async function sendMessage() {

        const message =
        document.getElementById("message").value;

        if (!message) return;

        await fetch(
        "https://qeja-backend-azkf.onrender.com/send-chat",
        {
        method: "POST",

        headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
        },

        body: JSON.stringify({
        landlord_id,
        tenant_id,
        sender_role: "landlord",
        message
        })
        }
        );

        document.getElementById("message").value = "";

        loadMessages();
        }

        loadMessages();

        setInterval(loadMessages, 2000);

    </script>

</body>
</html>
