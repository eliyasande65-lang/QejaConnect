<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- ============================================================
     QejaConnect PWA — paste this block inside <head> on EVERY page
     ============================================================ -->
    <!-- PWA Manifest -->
    <link rel="manifest" href="/QejaConnect/manifest.json">

    <!-- Theme colour (browser chrome / Android status bar) -->
    <meta name="theme-color" content="#4f46e5">

    <!-- iOS home-screen support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="QejaConnect">
    <link rel="apple-touch-icon" href="/QejaConnect/logo.jpg">

    <!-- Register Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
        navigator.serviceWorker.register('/QejaConnect/sw.js')
        .then(reg => console.log('SW registered:', reg.scope))
        .catch(err => console.error('SW error:', err));
        });
        }
    </script>

    <!-- ============================================================
         END QejaConnect PWA block
         ============================================================ -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landlord Chat | Qeja Connect</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            height: 100vh;
            overflow: hidden;
        }

        .top {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(45deg, indigo, darkviolet);
            color: white;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 1000;
        }

            .top .back-btn {
                background: rgba(255,255,255,0.2);
                border: none;
                color: white;
                border-radius: 8px;
                padding: 6px 12px;
                cursor: pointer;
                font-size: 18px;
            }

            .top .chat-name {
                font-size: 18px;
                font-weight: bold;
                flex: 1;
            }

            .top .status {
                font-size: 12px;
                opacity: 0.85;
            }

        #messages {
            position: fixed;
            top: 60px;
            bottom: 70px;
            left: 0;
            width: 100%;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg {
            padding: 12px 16px;
            border-radius: 16px;
            max-width: 80%;
            width: fit-content;
            word-wrap: break-word;
            overflow-wrap: break-word;
            font-size: 15px;
            line-height: 1.5;
        }

        .mine {
            background: indigo;
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }

        .other {
            background: white;
            color: black;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }

        .msg-label {
            font-size: 11px;
            margin-bottom: 3px;
            color: #888;
        }

        .mine-wrap {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .other-wrap {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .empty-state {
            text-align: center;
            color: #aaa;
            margin: auto;
            font-size: 15px;
        }

        .bottom {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: white;
            border-top: 1px solid #ddd;
        }

            .bottom input {
                flex: 1;
                min-width: 0;
                padding: 12px 14px;
                border-radius: 12px;
                border: 1px solid #ccc;
                font-size: 16px;
                outline: none;
            }

            .bottom button {
                padding: 12px 18px;
                border: none;
                background: indigo;
                color: white;
                border-radius: 12px;
                cursor: pointer;
                font-size: 15px;
            }
    </style>
</head>

<body>

    <div class="top">
        <button class="back-btn" onclick="history.back()">←</button>
        <div>
            <div class="chat-name" id="chatName">Chat</div>
            <div class="status" id="chatStatus">Loading...</div>
        </div>
    </div>

    <div id="messages">
        <div class="empty-state" id="emptyState">Loading messages...</div>
    </div>

    <div class="bottom">
        <input type="text" id="messageInput" placeholder="Type a message..." onkeydown="handleKey(event)">
        <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>

    <script>
        // 🔥 GitHub Pages FIX (prevents root-path 404 issues in future assets)
        const BASE_PATH = window.location.pathname.includes("QejaConnect")
        ? "/QejaConnect/"
        : "/";

        const token        = localStorage.getItem("token");
        const loggedUser   = JSON.parse(localStorage.getItem("loggedUser"));
        const convId       = localStorage.getItem("conversation_id");

        let cachedLandlordId = null;
        let cachedTenantId   = null;
        let pollingTimer     = null;
        let lastMessageCount = -1;

        if (!token || !loggedUser || !convId) {
        document.getElementById("emptyState").textContent =
        "Session expired. Please log in again.";
        } else {
        loadMessages();
        pollingTimer = setInterval(loadMessages, 4000);
        }

        async function loadMessages() {
        try {
        const res = await fetch(
        `https://qeja-backend-azkf.onrender.com/messages/${convId}`,
        { headers: { "Authorization": "Bearer " + token } }
        );

        const data = await res.json();

        cachedLandlordId = data.landlord_id;
        cachedTenantId   = data.tenant_id;

        const msgs = data.messages || [];
        const container = document.getElementById("messages");

        const atBottom =
        container.scrollHeight - container.scrollTop - container.clientHeight < 80;

        if (msgs.length === 0) {
        container.innerHTML = `<div class="empty-state">No messages yet.</div>`;
        } else {
        container.innerHTML = msgs.map(chat => {
        const isMe = chat.sender_role === "landlord";
        return `
        <div class="${isMe ? "mine-wrap" : "other-wrap"}">
        <div class="msg-label">${isMe ? "You" : "Tenant"}</div>
        <div class="msg ${isMe ? "mine" : "other"}">${escapeHtml(chat.message)}</div>
        </div>`;
        }).join("");
        }

        if (atBottom || msgs.length !== lastMessageCount) {
        container.scrollTop = container.scrollHeight;
        }

        lastMessageCount = msgs.length;

        document.getElementById("chatStatus").textContent = "Active conversation";

        } catch (err) {
        document.getElementById("chatStatus").textContent = "Reconnecting...";
        }
        }

        async function sendMessage() {
        const input = document.getElementById("messageInput");
        const message = input.value.trim();
        if (!message) return;

        const btn = document.getElementById("sendBtn");
        btn.disabled = true;
        input.value = "";

        try {
        await fetch(
        "https://qeja-backend-azkf.onrender.com/send-message",
        {
        method: "POST",
        headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
        },
        body: JSON.stringify({
        conversation_id: convId,
        landlord_id: cachedLandlordId,
        tenant_id: cachedTenantId,
        sender_role: "landlord",
        message
        })
        }
        );

        await new Promise(r => setTimeout(r, 300));
        loadMessages();

        } catch (err) {
        alert("Network error");
        }

        btn.disabled = false;
        }

        function handleKey(e) {
        if (e.key === "Enter") sendMessage();
        }

        function escapeHtml(str) {
        return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
        }

        document.addEventListener("visibilitychange", () => {
        if (document.hidden) {
        clearInterval(pollingTimer);
        } else {
        loadMessages();
        pollingTimer = setInterval(loadMessages, 5000);
        }
        });
    </script>

</body>
</html>
