
<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>

    <style>

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial,sans-serif;
            background: #f4f4f4;
            height: 100vh;
            overflow: hidden;
        }

        .top {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(45deg,indigo,darkviolet);
            color: white;
            padding: 18px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            z-index: 1000;
        }

        #messages {
            position: fixed;
            top: 70px;
            bottom: 85px;
            left: 0;
            width: 100%;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg {
            padding: 14px 16px;
            border-radius: 16px;
            max-width: 80%;
            width: fit-content;
            word-wrap: break-word;
            overflow-wrap: break-word;
            font-size: 15px;
            line-height: 1.5;
        }

        .mine {
            background: indigo;
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }

        .other {
            background: white;
            color: black;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }

        .bottom {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: white;
            border-top: 1px solid #ddd;
        }

            .bottom input {
                flex: 1;
                min-width: 0;
                padding: 14px;
                border-radius: 12px;
                border: 1px solid #ccc;
                font-size: 16px;
            }

            .bottom button {
                padding: 14px 18px;
                border: none;
                background: indigo;
                color: white;
                border-radius: 12px;
                cursor: pointer;
                font-size: 15px;
                white-space: nowrap;
            }

                .bottom button:hover {
                    background: darkviolet;
                }

        /* LARGE SCREENS */
        @media(min-width:900px) {

            #messages {
                width: 900px;
                left: 50%;
                transform: translateX(-50%);
            }

            .bottom {
                justify-content: center;
            }

                .bottom input {
                    max-width: 700px;
                }
        }

        /* SMALL PHONES */
        @media(max-width:480px) {

            .msg {
                max-width: 88%;
                font-size: 14px;
            }

            .bottom {
                padding: 8px;
                gap: 8px;
            }

                .bottom input {
                    padding: 12px;
                    font-size: 15px;
                }

                .bottom button {
                    padding: 12px 14px;
                    font-size: 14px;
                }
        }
    </style>

</head>

<body>

    <div class="top">
        Qeja Chat
    </div>

    <div id="messages"></div>

    <div class="bottom">

        <input type="text"
               id="message"
               placeholder="Type message...">

        <button onclick="sendMessage()">
            Send
        </button>

    </div>

   
    <script>

        const token =
        localStorage.getItem("token");

        const loggedUser =
        JSON.parse(localStorage.getItem("loggedUser"));

        const conversation_id =
        localStorage.getItem("conversation_id");

        async function loadMessages() {

        const res = await fetch(
        `https://qeja-backend-azkf.onrender.com/messages/${conversation_id}`,
        {
        headers: {
        "Authorization": "Bearer " + token
        }
        });

        const data = await res.json();

        const messages =
        document.getElementById("messages");

        messages.innerHTML = "";

        if (!data.messages) return;

        data.messages.forEach(chat => {

        messages.innerHTML += `
        <div class="msg ${
        chat.sender_role === 'landlord'
        ? 'mine'
        : 'other'
        }">

        ${chat.message}

        </div>
        `;
        });

        messages.scrollTop =
        messages.scrollHeight;
        }

        async function sendMessage() {

        const message =
        document.getElementById("message").value;

        if (!message) return;

        const landlord_id = loggedUser.id;

        await fetch(
        "https://qeja-backend-azkf.onrender.com/send-message",
        {
        method: "POST",

        headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
        },

        body: JSON.stringify({

        conversation_id,

        landlord_id,

        tenant_id: null,

        sender_role: "landlord",

        message
        })
        });

        document.getElementById("message").value = "";

        loadMessages();
        }

        loadMessages();

        setInterval(loadMessages, 2000);

    </script>
 

</body>
</html>
