<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tenant Chat | Qeja Connect</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            height: 100vh;
            overflow: hidden;
        }

        .top {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(45deg, indigo, darkviolet);
            color: white;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 1000;
        }

            .top .back-btn {
                background: rgba(255,255,255,0.2);
                border: none;
                color: white;
                border-radius: 8px;
                padding: 6px 12px;
                cursor: pointer;
                font-size: 18px;
            }

            .top .chat-name {
                font-size: 18px;
                font-weight: bold;
                flex: 1;
            }

            .top .status {
                font-size: 12px;
                opacity: 0.85;
            }

        #messages {
            position: fixed;
            top: 60px;
            bottom: 70px;
            left: 0;
            width: 100%;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg {
            padding: 12px 16px;
            border-radius: 16px;
            max-width: 80%;
            width: fit-content;
            word-wrap: break-word;
            overflow-wrap: break-word;
            font-size: 15px;
            line-height: 1.5;
        }

        /* Tenant messages appear on the RIGHT */
        .mine {
            background: indigo;
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }

        /* Landlord messages appear on the LEFT */
        .other {
            background: white;
            color: black;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }

        .msg-label {
            font-size: 11px;
            margin-bottom: 3px;
            color: #888;
        }

        .mine-wrap {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .other-wrap {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .empty-state {
            text-align: center;
            color: #aaa;
            margin: auto;
            font-size: 15px;
        }

        .bottom {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: white;
            border-top: 1px solid #ddd;
        }

            .bottom input {
                flex: 1;
                min-width: 0;
                padding: 12px 14px;
                border-radius: 12px;
                border: 1px solid #ccc;
                font-size: 16px;
                outline: none;
            }

                .bottom input:focus {
                    border-color: indigo;
                }

            .bottom button {
                padding: 12px 18px;
                border: none;
                background: indigo;
                color: white;
                border-radius: 12px;
                cursor: pointer;
                font-size: 15px;
                white-space: nowrap;
                transition: background 0.2s;
            }

                .bottom button:disabled {
                    opacity: 0.6;
                    cursor: not-allowed;
                }

                .bottom button:hover:not(:disabled) {
                    background: darkviolet;
                }

        @media(min-width: 900px) {
            #messages {
                width: 900px;
                left: 50%;
                transform: translateX(-50%);
            }

            .bottom {
                justify-content: center;
            }

                .bottom input {
                    max-width: 700px;
                }
        }

        @media(max-width: 480px) {
            .msg {
                max-width: 88%;
                font-size: 14px;
            }

            .bottom {
                padding: 8px;
                gap: 8px;
            }

                .bottom input {
                    padding: 11px;
                    font-size: 15px;
                }

                .bottom button {
                    padding: 11px 14px;
                    font-size: 14px;
                }
        }
    </style>
</head>

<body>

    <div class="top">
        <button class="back-btn" onclick="history.back()">←</button>
        <div>
            <div class="chat-name" id="chatName">Chat</div>
            <div class="status" id="chatStatus">Loading...</div>
        </div>
    </div>

    <div id="messages">
        <div class="empty-state" id="emptyState">Loading messages...</div>
    </div>

    <div class="bottom">
        <input type="text" id="messageInput" placeholder="Type a message..." onkeydown="handleKey(event)">
        <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>

    <script>

        // ── State ──────────────────────────────────────────
        const token      = localStorage.getItem("token");
        const loggedUser = JSON.parse(localStorage.getItem("loggedUser"));
        const convId     = localStorage.getItem("conversation_id");

        let cachedLandlordId = null;
        let cachedTenantId   = null;
        let pollingTimer     = null;
        let lastMessageCount = -1;

        // ── Boot ───────────────────────────────────────────
        if (!token || !loggedUser || !convId) {
        document.getElementById("emptyState").textContent = "Session expired. Please log in again.";
        } else {
        loadMessages();
        pollingTimer = setInterval(loadMessages, 4000);
        }

        // ── Load messages ──────────────────────────────────
        async function loadMessages() {
        try {
        const res = await fetch(
        `https://qeja-backend-azkf.onrender.com/messages/${convId}`,
        { headers: { "Authorization": "Bearer " + token } }
        );

        if (!res.ok) {
        document.getElementById("chatStatus").textContent = "Error loading chat";
        return;
        }

        const data = await res.json();

        if (!data.success) {
        document.getElementById("chatStatus").textContent = "Error loading chat";
        return;
        }

        // Cache IDs for sendMessage — never re-fetched
        cachedLandlordId = data.landlord_id;
        cachedTenantId   = data.tenant_id;

        const msgs      = data.messages || [];
        const container = document.getElementById("messages");

        // Always re-render — no diff check that could suppress updates
        const atBottom =
        container.scrollHeight - container.scrollTop - container.clientHeight < 80;

        if (msgs.length === 0) {
        container.innerHTML = `<div class="empty-state">No messages yet. Start the conversation!</div>`;
        } else {
        container.innerHTML = msgs.map(chat => {
        const isMe = chat.sender_role === "tenant";
        return `
        <div class="${isMe ? "mine-wrap" : "other-wrap"}">
        <div class="msg-label">${isMe ? "You" : "Landlord"}</div>
        <div class="msg ${isMe ? "mine" : "other"}">${escapeHtml(chat.message)}</div>
        </div>`;
        }).join("");
        }

        // Scroll to bottom on new messages or first load
        if (atBottom || msgs.length !== lastMessageCount) {
        container.scrollTop = container.scrollHeight;
        }
        lastMessageCount = msgs.length;

        document.getElementById("chatStatus").textContent = "Active conversation";

        } catch (err) {
        document.getElementById("chatStatus").textContent = "Reconnecting...";
        }
        }

        // ── Send message ───────────────────────────────────
        async function sendMessage() {
        const input   = document.getElementById("messageInput");
        const message = input.value.trim();
        if (!message) return;

        if (!cachedLandlordId || !cachedTenantId) {
        alert("Conversation not ready yet — please wait a moment.");
        return;
        }

        const btn = document.getElementById("sendBtn");
        btn.disabled = true;
        input.value  = "";

        try {
        const res = await fetch(
        "https://qeja-backend-azkf.onrender.com/send-message",
        {
        method: "POST",
        headers: {
        "Content-Type":  "application/json",
        "Authorization": "Bearer " + token
        },
        body: JSON.stringify({
        conversation_id: convId,
        landlord_id:     cachedLandlordId,
        tenant_id:       cachedTenantId,
        sender_role:     "tenant",
        message
        })
        }
        );

        const data = await res.json();

        if (data.success) {
        // Wait for DB write to complete before fetching
        await new Promise(r => setTimeout(r, 300));
        await loadMessages();
        } else {
        alert(data.message || "Failed to send");
        input.value = message;
        }
        } catch (err) {
        alert("Network error. Please try again.");
        input.value = message;
        }

        btn.disabled = false;
        input.focus();
        }

        // ── Enter key to send ──────────────────────────────
        function handleKey(e) {
        if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
        }
        }

        // ── XSS protection ─────────────────────────────────
        function escapeHtml(str) {
        return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
        }

        // ── Pause polling when tab not visible ─────────────
        document.addEventListener("visibilitychange", () => {
        if (document.hidden) {
        clearInterval(pollingTimer);
        } else {
        loadMessages();
        pollingTimer = setInterval(loadMessages, 5000);
        }
        });

    </script>

</body>
</html>
