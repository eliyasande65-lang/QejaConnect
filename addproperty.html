<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Property</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            margin: auto;
            background: #1e293b;
            padding: 30px;
            border-radius: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input, textarea, select {
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: #334155;
            color: white;
            font-size: 16px;
        }

        textarea {
            height: 120px;
            resize: none;
        }

        /* ✅ INDIGO LABEL UPLOAD BUTTON */
        .upload-label {
            display: inline-block;
            padding: 14px;
            text-align: center;
            border-radius: 10px;
            background: indigo;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

            .upload-label:hover {
                background: darkviolet;
            }

        input[type="file"] {
            display: none;
        }

        /* SUBMIT BUTTON */
        button {
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(45deg, indigo, darkviolet);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

            button:hover {
                opacity: 0.9;
            }
    </style>
</head>

<body>

    <div class="container">

        <h1>Add Property</h1>

        <form id="propertyForm" enctype="multipart/form-data">

            <input type="text" id="title" placeholder="Property Title" required>

            <input type="text" id="price" placeholder="Price e.g Ksh 7000/month" required>

            <input type="text" id="location" placeholder="Location" required>

            <select id="type">
                <option>Apartment</option>
                <option>Bedsitter</option>
                <option>Hostel</option>
                <option>Single Room</option>
            </select>

            <!-- ✅ INDIGO LABEL BUTTON -->
            <label for="image" class="upload-label">
                📷 Choose Property Image
            </label>
            <input type="file" id="image" accept="image/*" required>

            <textarea id="description" placeholder="Describe property" required></textarea>

            <button type="submit">Upload Property</button>

        </form>

    </div>

    <script>
        const form = document.getElementById("propertyForm");

        form.addEventListener("submit", async function(e) {
        e.preventDefault();

        const loggedUser = JSON.parse(localStorage.getItem("loggedUser"));

        if (!loggedUser) {
        alert("Please login first");
        return;
        }

        if (!document.getElementById("image").files[0]) {
        alert("Please select an image");
        return;
        }

        const formData = new FormData();

        formData.append("landlord_id", loggedUser.id);
        formData.append("title", document.getElementById("title").value);
        formData.append("price", document.getElementById("price").value);
        formData.append("location", document.getElementById("location").value);
        formData.append("type", document.getElementById("type").value);
        formData.append("description", document.getElementById("description").value);
        formData.append("image", document.getElementById("image").files[0]);

        try {
        const res = await fetch(
        "https://qeja-backend-azkf.onrender.com/upload-property",
        {
        method: "POST",
        body: formData
        }
        );

        const data = await res.json();

        // ✅ RESTORED ALERTS
        if (data.success) {
        alert("✅ Property uploaded successfully");

        // optional reset
        form.reset();

        // redirect
        window.location.href =
        "https://eliyasande65-lang.github.io/QejaConnect/hostdashboard.html";
        } else {
        alert(data.error || "Upload failed");
        }

        } catch (err) {
        console.log(err);
        alert("Server error. Try again later.");
        }
        });
    </script>

</body>
</html>
