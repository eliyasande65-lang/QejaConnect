<!DOCTYPE html>
<html>
<head>

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
    <!-- ============================================================
     QejaConnect PWA — paste this block inside <head> on EVERY page
     ============================================================ -->
    <!-- PWA Manifest -->
    <link rel="manifest" href="/QejaConnect/manifest.json">

    <!-- Theme colour (browser chrome / Android status bar) -->
    <meta name="theme-color" content="#4f46e5">

    <!-- iOS home-screen support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="QejaConnect">
    <link rel="apple-touch-icon" href="/QejaConnect/logo.jpg">

    <!-- Register Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
        navigator.serviceWorker.register('/QejaConnect/sw.js')
        .then(reg => console.log('SW registered:', reg.scope))
        .catch(err => console.error('SW error:', err));
        });
        }
    </script>

    <!-- ============================================================
         END QejaConnect PWA block
         ============================================================ -->
    <title>Tenant Chat</title>

    <style>

        body {
            margin: 0;
            font-family: Arial;
            background: #f4f4f4;
        }

        .top {
            background: indigo;
            color: white;
            padding: 18px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
        }

        #messages {
            height: calc(100vh - 150px);
            overflow-y: auto;
            padding: 20px;
        }

        .msg {
            padding: 14px;
            border-radius: 14px;
            margin-bottom: 10px;
            max-width: 75%;
        }

        .mine {
            background: indigo;
            color: white;
            margin-left: auto;
        }

        .other {
            background: white;
            color: black;
        }

        .bottom {
            position: fixed;
            bottom: 0;
            width: 100%;
            display: flex;
            gap: 10px;
            padding: 12px;
            background: white;
        }

            .bottom input {
                flex: 1;
                padding: 14px;
                border-radius: 10px;
                border: 1px solid #ccc;
            }

            .bottom button {
                padding: 14px 20px;
                border: none;
                background: indigo;
                color: white;
                border-radius: 10px;
            }
    </style>
</head>

<body>

    <div class="top">
        Qeja Chat
    </div>

    <div id="messages"></div>

    <div class="bottom">

        <input type="text"
               id="message"
               placeholder="Type message...">

        <button onclick="sendMessage()">
            Send
        </button>

    </div>

    <script>

        const token =
        localStorage.getItem("token");

        const loggedUser =
        JSON.parse(localStorage.getItem("loggedUser"));

        const landlord_id =
        localStorage.getItem("chatLandlord");

        const tenant_id =
        loggedUser.id;

        async function loadMessages() {

        const res = await fetch(
        `https://qeja-backend-azkf.onrender.com/chat/${landlord_id}/${tenant_id}`,
        {
        headers:{
        "Authorization":
        "Bearer " + token
        }
        }
        );

        const data = await res.json();

        const messages =
        document.getElementById("messages");

        messages.innerHTML = "";

        // SAFE GUARD (prevents crash if chats missing)
        (data.chats || []).forEach(chat => {

        messages.innerHTML += `
        <div class="msg ${
        chat.sender_role === 'tenant'
        ? 'mine'
        : 'other'
        }">
        ${chat.message}
        </div>
        `;
        });

        messages.scrollTop =
        messages.scrollHeight;
        }

        async function sendMessage() {

        const message =
        document.getElementById("message").value;

        if (!message) return;

        await fetch(
        "https://qeja-backend-azkf.onrender.com/send-chat",
        {
        method:"POST",

        headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer " + token
        },

        body:JSON.stringify({
        landlord_id,
        tenant_id,
        sender_role:"tenant",
        message
        })
        }
        );

        document.getElementById("message").value = "";

        loadMessages();
        }

        loadMessages();

        setInterval(loadMessages, 2000);

    </script>

    

</body>
</html>
