    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Qeja Connect</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
        }

        header {
            background: linear-gradient(45deg, indigo, darkviolet);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            color: white;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        #logo {
            width: 60px;
            height: 60px;
            border-radius: 12px;
        }

        nav {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

            nav a {
                color: white;
                text-decoration: none;
                font-weight: bold;
            }

        .contact-section {
            max-width: 1000px;
            margin: auto;
            padding: 50px 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .contact-box,
        .form-box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1 {
            color: indigo;
        }

        textarea {
            width: 100%;
            padding: 14px;
            margin-top: 15px;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 15px;
            resize: none;
            height: 120px;
        }

        button {
            margin-top: 20px;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: indigo;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .alert {
            margin-top: 15px;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            display: none;
        }

            .alert.success {
                background: #e6f9ee;
                color: #1a7a3f;
                border: 1px solid #a3d9b1;
                display: block;
            }

            .alert.error {
                background: #fdecea;
                color: #a32d2d;
                border: 1px solid #f5aaaa;
                display: block;
            }

        .login-notice {
            background: #fff8e1;
            border: 1px solid #ffe082;
            border-radius: 10px;
            padding: 14px;
            display: none;
        }

        footer {
            background: #1a1a1a;
            color: white;
            text-align: center;
            padding: 30px;
        }
    </style>
</head>

<body>

    <header>
        <div class="logo-area">
            <img src="logo.jpg" id="logo" alt="logo">
            <h2>Qeja Connect</h2>
        </div>

        <nav>
            <a href="home.html">Home</a>
            <a href="properties.html">Properties</a>
            <a href="landlords.html">Landlords</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <section class="contact-section">

        <div class="contact-box">
            <h1>Contact Us</h1>
            <p>Email: qejaconnect@outlook.com</p>
            <p>Phone: +254714104737</p>
            <p>Alternative: +25471203443</p>
            <p>Nairobi, Kenya</p>
        </div>

        <div class="form-box">
            <h1>Send Message</h1>

            <div class="login-notice" id="loginNotice">
                You need to be logged in to send a message.
                <a href="welcome.html" style="color:indigo;font-weight:bold;">Login →</a>
            </div>

            <div id="formArea">
                <textarea id="messageBox" placeholder="Type your message here..."></textarea>
                <button id="sendBtn" onclick="sendMessage()">Send Message</button>
                <div class="alert" id="alertBox"></div>
            </div>
        </div>

    </section>

    <footer>
        <p>© 2026 Qeja Connect Kenya Ltd. All Rights Reserved.</p>
    </footer>

    <script>

        const token = localStorage.getItem("token");
        const loggedUser = JSON.parse(localStorage.getItem("loggedUser"));

        window.onload = function () {
        if (!token || !loggedUser) {
        document.getElementById("loginNotice").style.display = "block";
        document.getElementById("formArea").style.display = "none";
        }
        };

        function showAlert(type, msg) {
        const box = document.getElementById("alertBox");
        box.className = "alert " + type;
        box.textContent = msg;
        }

        async function sendMessage() {
        const message = document.getElementById("messageBox").value.trim();

        if (!message) return showAlert("error", "Type a message first");

        const btn = document.getElementById("sendBtn");
        btn.disabled = true;
        btn.textContent = "Sending...";

        try {
        const res = await fetch(
        "https://qeja-backend-azkf.onrender.com/contact",
        {
        method: "POST",
        headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
        },
        body: JSON.stringify({ message })
        }
        );

        const data = await res.json();

        if (data.success) {
        showAlert("success", "Message sent successfully");
        document.getElementById("messageBox").value = "";
        } else {
        showAlert("error", data.message || "Failed");
        }

        } catch {
        showAlert("error", "Network error");
        }

        btn.disabled = false;
        btn.textContent = "Send Message";
        }

    </script>
