<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qeja Connect | Home</title>

    <style>

                /* =========================
           THEME SYSTEM
        ========================= */
                :root {
                    --bg: #f4f4f4;
                    --text: #222;
                    --card: #ffffff;
                    --muted: #555;
                    --shadow: rgba(0,0,0,0.1);
                }

                body.dark {
                    --bg: #0f0f0f;
                    --text: #f1f1f1;
                    --card: #1c1c1c;
                    --muted: #bbbbbb;
                    --shadow: rgba(0,0,0,0.5);
                }

                /* ========================= */

                * {
                    box-sizing: border-box;
                }

                body {
                    margin: 0;
                    font-family: Arial, sans-serif;
                    background: var(--bg);
                    color: var(--text);
                }

                /* HEADER */
                header {
                    width: 100%;
                    background: linear-gradient(45deg, indigo, darkviolet);
                    padding: 15px 30px;
                    display: flex;
                    justify-content: space-between;
                    align-items: center;
                    flex-wrap: wrap;
                    position: sticky;
                    top: 0;
                    z-index: 1000;
                }

                /* NAV (UNCHANGED) */
                nav {
                    display: flex;
                    gap: 15px;
                    flex-wrap: wrap;
                }

                    nav a {
                        color: white;
                        text-decoration: none;
                        font-weight: bold;
                        padding: 10px 15px;
                        border-radius: 8px;
                    }

                        nav a:hover {
                            background: rgba(255,255,255,0.15);
                        }

                /* CARDS */
                .property-card {
                    background: var(--card);
                    box-shadow: 0 0 10px var(--shadow);
                }

                /* POPUP */
                .popup-container {
                    position: fixed;
                    inset: 0;
                    background: rgba(0,0,0,0.75);
                    display: none;
                    justify-content: center;
                    align-items: center;
                    z-index: 5000;
                }

                .popup-content {
                    background: var(--card);
                    color: var(--text);
                    width: 100%;
                    max-width: 430px;
                    border-radius: 15px;
                    overflow: hidden;
                    position: relative;
                }
    </style>
</head>

<body>

    <header>

        <div class="logo-area">
            <img src="logo.jpg" id="logo" style="width:60px;border-radius:12px;">
            <div class="brand">
                <h2 style="color:white;">Qeja Connect</h2>
            </div>
        </div>

        <nav>
            <a href="https://eliyasande65-lang.github.io/QejaConnect/home.html">Home</a>
            <a href="https://eliyasande65-lang.github.io/QejaConnect/properties.html">Properties</a>
            <a href="https://eliyasande65-lang.github.io/QejaConnect/landlords.html">Landlords</a>
            <a href="https://eliyasande65-lang.github.io/QejaConnect/hostdashboard.html">Dashboard</a>
            <a href="https://eliyasande65-lang.github.io/QejaConnect/contact.html">Contact</a>
            <a href="https://eliyasande65-lang.github.io/QejaConnect/welcome.html">Log out</a>
            <a href="https://eliyasande65-lang.github.io/QejaConnect/settings.html">Settings</a>
        </nav>

    </header>

    <div id="popup" class="popup-container">

        <div class="popup-content">

            <span onclick="closePopup()" style="cursor:pointer;position:absolute;right:15px;top:10px;font-size:30px;">&times;</span>

            <img id="popup-image" style="width:100%;height:200px;object-fit:cover;">

            <h2 id="popup-title"></h2>
            <div id="popup-price"></div>
            <div id="popup-location"></div>
            <p id="popup-description"></p>

            <div id="popup-features"></div>

            <div style="padding:15px;">
                <strong>Owner:</strong>
                <p id="popup-owner"></p>
            </div>

        </div>

    </div>

    <script>

        /* =========================
        THEME LOAD
        ========================= */
        window.onload = function () {
        if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark");
        }
        };

        /* =========================
        POPUP FUNCTIONS
        ========================= */
        function openPopup(title, price, location, desc, image, features, owner) {

        document.getElementById("popup-title").innerText = title;
        document.getElementById("popup-price").innerText = price;
        document.getElementById("popup-location").innerText = location;
        document.getElementById("popup-description").innerText = desc;
        document.getElementById("popup-image").src = image;
        document.getElementById("popup-owner").innerText = owner;

        let html = "";
        features.forEach(f => {
        html += `<span style="margin:5px;padding:5px;background:#eee;border-radius:10px;">${f}</span>`;
        });

        document.getElementById("popup-features").innerHTML = html;

        document.getElementById("popup").style.display = "flex";
        }

        function closePopup() {
        document.getElementById("popup").style.display = "none";
        }

        window.onclick = function (e) {
        if (e.target.id === "popup") {
        closePopup();
        }
        };

    </script>

</body>
</html>
