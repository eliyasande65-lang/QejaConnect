<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="/QejaConnect/manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="QejaConnect">
    <link rel="apple-touch-icon" href="/QejaConnect/logo.jpg">
    <script>
        if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
        navigator.serviceWorker.register('/QejaConnect/sw.js')
        .then(reg => console.log('SW registered:', reg.scope))
        .catch(err => console.error('SW error:', err));
        });
        }
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Messages | Qeja Connect</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
        }

        .logo-area {
            display: flex;
            align-items: center;
            background: linear-gradient(45deg, indigo, darkviolet);
            padding: 10px 15px;
            gap: 15px;
            position: relative;
        }

        #logo {
            width: 60px;
            height: 60px;
            margin-left: 60px;
            border-radius: 12px;
            object-fit: cover;
        }

        .brand {
            color: white;
        }

            .brand h2 {
                margin: 0;
            }

            .brand p {
                margin: 0;
                font-size: 13px;
                opacity: 0.85;
            }

        .menu-btn {
            position: fixed;
            top: 15px;
            left: 10px;
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 12px;
            background: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            z-index: 10001;
        }

        .side-menu {
            position: fixed;
            top: 0;
            left: -260px;
            width: 260px;
            height: 100%;
            background: #1b1b1b;
            z-index: 9999;
            transition: 0.3s;
            padding-top: 80px;
            box-shadow: 0 0 10px rgba(0,0,0,0.4);
        }

            .side-menu.active {
                left: 0;
            }

            .side-menu a {
                display: block;
                color: white;
                text-decoration: none;
                padding: 18px 25px;
                border-bottom: 1px solid #333;
                font-size: 16px;
            }

                .side-menu a:hover {
                    background: indigo;
                }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            z-index: 9998;
        }

            .overlay.active {
                display: block;
            }

        .page-wrap {
            max-width: 700px;
            margin: auto;
            padding: 24px 16px 60px;
        }

        .page-title {
            font-size: 22px;
            font-weight: bold;
            color: indigo;
            margin-bottom: 6px;
        }

        .page-sub {
            font-size: 14px;
            color: #888;
            margin-bottom: 24px;
        }

        /* Message thread card */
        .msg-thread {
            background: white;
            border-radius: 14px;
            box-shadow: 0 0 8px rgba(0,0,0,0.08);
            margin-bottom: 18px;
            overflow: hidden;
            animation: fadeUp 0.35s ease both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* User message bubble */
        .user-bubble-wrap {
            padding: 16px 18px 12px;
            border-bottom: 1px solid #f0f0f0;
        }

        .bubble-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .avatar-circle {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: indigo;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            flex-shrink: 0;
        }

        .bubble-name {
            font-size: 13px;
            font-weight: bold;
            color: #333;
        }

        .bubble-time {
            font-size: 11px;
            color: #aaa;
            margin-left: auto;
        }

        .user-bubble {
            background: #f0eeff;
            border-left: 3px solid indigo;
            border-radius: 0 10px 10px 10px;
            padding: 12px 14px;
            font-size: 14px;
            color: #333;
            line-height: 1.6;
        }

        /* Admin reply bubble */
        .reply-wrap {
            padding: 12px 18px 16px;
            background: #f9f9f9;
        }

        .reply-label {
            font-size: 11px;
            font-weight: bold;
            color: #2d9e6b;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

            .reply-label::before {
                content: '↩';
                font-size: 14px;
            }

        .reply-bubble {
            background: #e8f9f0;
            border: 1px solid #b6e8cf;
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 14px;
            color: #1a5e3a;
            line-height: 1.6;
        }

        .reply-time {
            font-size: 11px;
            color: #aaa;
            margin-top: 6px;
            text-align: right;
        }

        /* Pending badge */
        .pending-wrap {
            padding: 12px 18px 16px;
            background: #fffbf0;
        }

        .pending-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #fff3cd;
            border: 1px solid #ffe08a;
            border-radius: 8px;
            padding: 8px 14px;
            font-size: 13px;
            color: #856404;
        }

        /* States */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #aaa;
            font-size: 15px;
        }

            .empty-state .icon {
                font-size: 48px;
                margin-bottom: 12px;
            }

        .spinner-wrap {
            text-align: center;
            padding: 60px 20px;
            color: #888;
            font-size: 14px;
        }

        .spinner {
            display: inline-block;
            width: 32px;
            height: 32px;
            border: 3px solid #e0e0e0;
            border-top-color: indigo;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-bottom: 12px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* New message form */
        .new-msg-card {
            background: white;
            border-radius: 14px;
            box-shadow: 0 0 8px rgba(0,0,0,0.08);
            padding: 20px 18px;
            margin-bottom: 28px;
        }

            .new-msg-card h3 {
                color: indigo;
                margin: 0 0 12px;
                font-size: 16px;
            }

            .new-msg-card textarea {
                width: 100%;
                padding: 12px;
                border-radius: 10px;
                border: 1px solid #ccc;
                font-size: 14px;
                resize: none;
                height: 90px;
                font-family: Arial, sans-serif;
            }

                .new-msg-card textarea:focus {
                    outline: none;
                    border-color: indigo;
                }

        .send-btn {
            margin-top: 10px;
            padding: 11px 24px;
            border: none;
            border-radius: 10px;
            background: indigo;
            color: white;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
        }

            .send-btn:disabled {
                opacity: 0.55;
                cursor: not-allowed;
            }

        .alert {
            margin-top: 10px;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            display: none;
        }

            .alert.success {
                background: #e6f9ee;
                color: #1a7a3f;
                border: 1px solid #a3d9b1;
                display: block;
            }

            .alert.error {
                background: #fdecea;
                color: #a32d2d;
                border: 1px solid #f5aaaa;
                display: block;
            }

        /* unread dot */
        .unread-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #e24b4a;
            margin-left: 6px;
            vertical-align: middle;
        }

        footer {
            background: #1a1a1a;
            color: white;
            text-align: center;
            padding: 24px;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="logo-area">
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
        <img src="logo.jpg" id="logo" alt="logo">
        <div class="brand">
            <h2>Qeja Connect</h2>
            <p>Quality accommodation providence</p>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="closeMenu()"></div>

    <div class="side-menu" id="sideMenu">
        <a href="home.html">Home</a>
        <a href="properties.html">Properties</a>
        <a href="landlords.html">Landlords</a>
        <a href="contact.html">Contact</a>
        <a href="mymessages.html" style="color:#a78bfa;">My Messages</a>
        <a href="welcome.html">Log out</a>
        <button onclick="toggleTheme()" style="margin:20px;padding:10px;border:none;background:none;color:white;cursor:pointer;">
            🌙 Theme
        </button>
    </div>

    <div class="page-wrap">

        <div class="page-title">My Messages</div>
        <div class="page-sub">Messages you sent to support and admin replies</div>

        <!-- New message form -->
        <div class="new-msg-card">
            <h3>✉️ Send New Message</h3>
            <textarea id="newMsgBox" placeholder="Type your message to support..."></textarea>
            <br>
            <button class="send-btn" id="sendNewBtn" onclick="sendNewMessage()">Send Message</button>
            <div class="alert" id="newMsgAlert"></div>
        </div>

        <!-- Messages list -->
        <div id="msgList">
            <div class="spinner-wrap">
                <div class="spinner"></div><br>Loading messages…
            </div>
        </div>

    </div>

    <footer>
        <p>© 2026 Qeja Connect Kenya Ltd. All Rights Reserved.</p>
    </footer>

    <script>
        const API = 'https://qeja-backend-azkf.onrender.com';
        const token = localStorage.getItem('token');
        const loggedUser = JSON.parse(localStorage.getItem('loggedUser') || 'null');

        function fmtDate(dt) {
        if (!dt) return '—';
        return new Date(dt).toLocaleString('en-KE', {
        day: '2-digit', month: 'short', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
        });
        }

        function escH(s) {
        return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
        }

        async function loadMessages() {
        const list = document.getElementById('msgList');

        if (!token || !loggedUser) {
        list.innerHTML = `
        <div class="empty-state">
        <div class="icon">🔒</div>
        <p>Please <a href="welcome.html" style="color:indigo;font-weight:bold;">log in</a> to view your messages.</p>
        </div>`;
        return;
        }

        try {
        const res = await fetch(`${API}/my-messages`, {
        headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();

        if (!data.success) throw new Error(data.message);

        if (!data.messages || data.messages.length === 0) {
        list.innerHTML = `
        <div class="empty-state">
        <div class="icon">💬</div>
        <p>You haven't sent any messages yet.</p>
        </div>`;
        return;
        }

        const initial = (loggedUser.fullname || 'U')[0].toUpperCase();

        list.innerHTML = data.messages.map((m, i) => {
        const hasReply = !!m.reply;
        const isNew = hasReply && !wasSeenBefore(m.id);

        return `
        <div class="msg-thread" style="animation-delay:${i * 40}ms" id="thread-${m.id}">
        <div class="user-bubble-wrap">
        <div class="bubble-meta">
        <div class="avatar-circle">${initial}</div>
        <span class="bubble-name">${escH(loggedUser.fullname || 'You')}</span>
        <span class="bubble-time">${fmtDate(m.created_at)}</span>
        </div>
        <div class="user-bubble">${escH(m.message)}</div>
        </div>

        ${hasReply ? `
        <div class="reply-wrap">
        <div class="reply-label">Admin reply ${isNew ? '<span class="unread-dot"></span>' : ''}</div>
        <div class="reply-bubble">${escH(m.reply)}</div>
        <div class="reply-time">${fmtDate(m.replied_at)}</div>
        </div>` : `
        <div class="pending-wrap">
        <span class="pending-badge">⏳ Awaiting reply from support</span>
        </div>`}
        </div>`;
        }).join('');

        markAllSeen(data.messages);

        } catch (err) {
        list.innerHTML = `<div class="empty-state"><p>⚠️ ${escH(err.message)}</p></div>`;
        }
        }

        /* Track which replied messages the user has already seen */
        function getSeenIds() {
        try { return JSON.parse(localStorage.getItem('seenReplies') || '[]'); }
        catch { return []; }
        }

        function wasSeenBefore(id) {
        return getSeenIds().includes(id);
        }

        function markAllSeen(messages) {
        const repliedIds = messages.filter(m => m.reply).map(m => m.id);
        localStorage.setItem('seenReplies', JSON.stringify(repliedIds));
        /* Remove notification badge from nav if present */
        const badge = document.getElementById('navNotifBadge');
        if (badge) badge.style.display = 'none';
        }

        /* Count unread replies for badge use from other pages */
        async function countUnread() {
        if (!token) return 0;
        try {
        const res = await fetch(`${API}/my-messages`, {
        headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();
        if (!data.success) return 0;
        const seen = getSeenIds();
        return data.messages.filter(m => m.reply && !seen.includes(m.id)).length;
        } catch { return 0; }
        }

        async function sendNewMessage() {
        const box = document.getElementById('newMsgBox');
        const msg = box.value.trim();
        const alert = document.getElementById('newMsgAlert');
        const btn = document.getElementById('sendNewBtn');

        alert.className = 'alert';
        alert.style.display = 'none';

        if (!msg) {
        alert.className = 'alert error';
        alert.textContent = 'Please type a message first.';
        return;
        }

        if (!token) {
        alert.className = 'alert error';
        alert.textContent = 'You must be logged in to send a message.';
        return;
        }

        btn.disabled = true;
        btn.textContent = 'Sending…';

        try {
        const res = await fetch(`${API}/contact`, {
        method: 'POST',
        headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify({ message: msg })
        });
        const data = await res.json();

        if (!data.success) throw new Error(data.message);

        alert.className = 'alert success';
        alert.textContent = '✅ Message sent! We\'ll reply soon.';
        box.value = '';
        setTimeout(() => { alert.style.display = 'none'; }, 3000);
        loadMessages();

        } catch (err) {
        alert.className = 'alert error';
        alert.textContent = '⚠️ ' + err.message;
        }

        btn.disabled = false;
        btn.textContent = 'Send Message';
        }

        function toggleMenu() {
        document.getElementById('sideMenu').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
        }

        function closeMenu() {
        document.getElementById('sideMenu').classList.remove('active');
        document.getElementById('overlay').classList.remove('active');
        }

        window.onload = loadMessages;
    </script>
</body>
</html>
