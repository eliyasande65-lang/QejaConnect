<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Host Sign Up</title>

    <style>

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(45deg, indigo, darkviolet);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .foot {
            margin-top: 30px;
            text-align: center;
            color: #555;
            font-size: 14px;
            line-height: 1.7;
        }
        .page {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 650px;
            background: indigo;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: purple;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        input, textarea, select {
            padding: 14px;
            margin-top: 15px;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        textarea {
            resize: none;
            height: 100px;
        }

        button {
            margin-top: 20px;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: purple;
            color: white;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }

            button:hover {
                background: darkviolet;
            }
    </style>
</head>
<body>

    <div class="page">
        <div class="container">

            <h1>Host / Landlord Sign Up</h1>

            <form>

                <input type="text" placeholder="Full Name" required>

                <input type="email" placeholder="Email Address" required>

                <input type="tel" placeholder="254712457632" required>

                <input type="text" placeholder="National ID Number" required>

                <input type="text" placeholder="KRA PIN" required>

                <input type="text" placeholder="County" required>

                <input type="text" placeholder="Town / Estate" required>

                <input type="text" placeholder="Property Name" required>

                <select required>
                    <option value="">Property Type</option>
                    <option>Apartment</option>
                    <option>Bedsitter</option>
                    <option>Hostel</option>
                    <option>Single Room</option>
                    <option>Office Space</option>
                    <option>Other</option>
                </select>

                <input type="number" placeholder="Number of Units" required>

                <textarea placeholder="Describe your property"></textarea>

                <input type="file" required>

                <input type="password" placeholder="Password" required>

                <input type="password" placeholder="Confirm Password" required>

                <button type="submit" id="createaccount">Create Host Account</button>

            </form>

        </div>
        <div class="foot">
            <h3>Qeja Connect Credits</h3><br />
            <p>Developed by QejaConnect_Kenya ltd.</p><br />
            <p>Company Email address: qejaconnect@outlook.com</p>
            <p>Customer hotline: +254714 104 737</p>
            <p>Customer Hotline2: +25471 203 443</p>
            <p><em>Regulated by Communication Authority of Kenya</em></p>
        </div>
    </div>
    
    <script>
        document.querySelector("form").addEventListener("submit", async function(e) {
        e.preventDefault();

        const formData = {
        fullname: this.querySelector('input[placeholder="Full Name"]').value,
        email: this.querySelector('input[type="email"]').value,
        phone: this.querySelector('input[type="tel"]').value,
        id: this.querySelector('input[placeholder="National ID Number"]').value,
        kra: this.querySelector('input[placeholder="KRA PIN"]').value,
        county: this.querySelectorAll('input')[5].value,
        town: this.querySelectorAll('input')[6].value,
        property: this.querySelectorAll('input')[7].value,
        units: this.querySelector('input[type="number"]').value,
        password: this.querySelectorAll('input[type="password"]')[0].value
        };

        try {
        const res = await fetch("http://localhost:3000/register-landlord", {
        method: "POST",
        headers: {
        "Content-Type": "application/json"
        },
        body: JSON.stringify(formData)
        });

        const data = await res.json();

        if (data.success) {
        alert("STK Push sent to your phone. Complete payment to continue.");

        // wait for payment confirmation
        pollPaymentStatus(data.transactionId);
        } else {
        alert(data.message);
        }

        } catch (err) {
        console.error(err);
        alert("Something went wrong");
        }
        });

        async function pollPaymentStatus(transactionId) {
        let attempts = 0;

        const check = setInterval(async () => {
        attempts++;

        const res = await fetch(`http://localhost:3000/payment-status/${transactionId}`);
        const data = await res.json();

        if (data.paid) {
        clearInterval(check);
        window.location.href = "https://eliyasande65-lang.github.io/QejaConnect/hostdashboard.html";
        }

        if (attempts > 20) {
        clearInterval(check);
        alert("Payment timeout. Please try again.");
        }

        }, 3000);
        }
    </script>
</body>
</html>
