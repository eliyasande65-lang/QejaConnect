<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- ============================================================
     QejaConnect PWA — paste this block inside <head> on EVERY page
     ============================================================ -->
    <!-- PWA Manifest -->
    <link rel="manifest" href="/QejaConnect/manifest.json">

    <!-- Theme colour (browser chrome / Android status bar) -->
    <meta name="theme-color" content="#4f46e5">

    <!-- iOS home-screen support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="QejaConnect">
    <link rel="apple-touch-icon" href="/QejaConnect/logo.jpg">

    <!-- Register Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
        navigator.serviceWorker.register('/QejaConnect/sw.js')
        .then(reg => console.log('SW registered:', reg.scope))
        .catch(err => console.error('SW error:', err));
        });
        }
    </script>

    <!-- ============================================================
         END QejaConnect PWA block
         ============================================================ -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Host Sign Up</title>

    <style>

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(45deg, indigo, darkviolet);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .foot {
            margin-top: 30px;
            text-align: center;
            color: #555;
            font-size: 14px;
            line-height: 1.7;
        }

        .page {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 650px;
            background: indigo;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: purple;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        input, textarea, select {
            padding: 14px;
            margin-top: 15px;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        textarea {
            resize: none;
            height: 100px;
        }

        button {
            margin-top: 20px;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: purple;
            color: white;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }

            button:hover {
                background: darkviolet;
            }


        .upload-label {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 15px;
            padding: 14px;
            border-radius: 10px;
            background: purple;
            border: 2px dashed green;
            cursor: pointer;
            font-size: 15px;
            color: #333;
            transition: background 0.2s;
        }

            .upload-label:hover {
                background: #f0e6ff;
                border-color: indigo;
            }

            .upload-label .icon {
                font-size: 22px;
            }

            .upload-label .label-text {
                flex: 1;
            }

            .upload-label .file-name {
                font-size: 13px;
                color: #888;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                max-width: 180px;
            }

        /* Hidden real file input */
        #profile_pic {
            display: none;
        }
    </style>
</head>
<body>

    <div class="page">
        <div class="container">

            <h1>Host / Landlord Sign Up</h1>

            <form id="signupForm">

                <input type="text" placeholder="Full Name" required>

                <input type="email" placeholder="Email Address" required>

                <input type="tel" placeholder="254712457632" required>

                <input type="text" placeholder="National ID Number" required>

                <input type="text" placeholder="KRA PIN" required>

                <input type="text" placeholder="County" required>

                <input type="text" placeholder="Town / Estate" required>

                <input type="text" placeholder="Property Name" required>

                <select required>
                    <option value="">Property Type</option>
                    <option>Apartment</option>
                    <option>Bedsitter</option>
                    <option>Hostel</option>
                    <option>Single Room</option>
                    <option>Office Space</option>
                    <option>Other</option>
                </select>

                <input type="number" placeholder="Number of Units" required>

                <textarea placeholder="Describe your property"></textarea>

                <!-- Styled upload label — replaces plain file input -->
                <label for="profile_pic" class="upload-label">
                    <span class="icon">📷</span>
                    <span class="label-text">Upload Profile Picture</span>
                    <span class="file-name" id="fileNameDisplay">No file chosen</span>
                </label>
                <input type="file" id="profile_pic" accept="image/*" required>

                <input type="password" placeholder="Password" required>

                <input type="password" placeholder="Confirm Password" required>

                <button type="submit" id="createaccount">Create Host Account</button>

            </form>

        </div>
        <div class="foot">
            <h3>Qeja Connect Credits</h3><br />
            <p>Developed by QejaConnect_Kenya ltd.</p><br />
            <p>Company Email address: qejaconnect@outlook.com</p>
            <p>Customer hotline: +254714 104 737</p>
            <p>Customer Hotline2: +25471 203 443</p>
            <p><em>Regulated by Communication Authority of Kenya</em></p>
        </div>
    </div>

    <script>

        // Show selected filename on the label
        document.getElementById("profile_pic").addEventListener("change", function () {
        const display = document.getElementById("fileNameDisplay");
        if (this.files && this.files[0]) {
        display.textContent = this.files[0].name;
        display.style.color = "indigo";
        } else {
        display.textContent = "No file chosen";
        display.style.color = "#888";
        }
        });

        document.getElementById("signupForm").addEventListener("submit", async function (e) {
        e.preventDefault();

        const password        = this.querySelectorAll('input[type="password"]')[0].value;
        const confirmPassword = this.querySelectorAll('input[type="password"]')[1].value;

        if (password !== confirmPassword) {
        alert("Passwords do not match");
        return;
        }

        const fileInput = document.getElementById("profile_pic");
        const file      = fileInput.files[0];

        if (!file) {
        alert("Please upload a profile picture");
        return;
        }

        const formData = new FormData();
        formData.append("fullname",    this.querySelector('input[placeholder="Full Name"]').value);
        formData.append("email",       this.querySelector('input[type="email"]').value);
        formData.append("phone",       this.querySelector('input[type="tel"]').value);
        formData.append("id",          this.querySelector('input[placeholder="National ID Number"]').value);
        formData.append("kra",         this.querySelector('input[placeholder="KRA PIN"]').value);
        formData.append("county",      this.querySelector('input[placeholder="County"]').value);
        formData.append("town",        this.querySelector('input[placeholder="Town / Estate"]').value);
        formData.append("property",    this.querySelector('input[placeholder="Property Name"]').value);
        formData.append("type",        this.querySelector("select").value);
        formData.append("units",       this.querySelector('input[type="number"]').value);
        formData.append("description", this.querySelector("textarea").value);
        formData.append("password",    password);
        formData.append("profile_pic", file);

        const btn = document.getElementById("createaccount");
        btn.disabled    = true;
        btn.textContent = "Creating account...";

        try {
        const res  = await fetch("https://qeja-backend-azkf.onrender.com/register-landlord", {
        method: "POST",
        body:   formData
        });
        const data = await res.json();

        if (data.success) {
        alert("Account created successfully 🎉");
        window.location.href = "https://eliyasande65-lang.github.io/QejaConnect/login.html";
        } else {
        alert(data.message || "Signup failed");
        }

        } catch (err) {
        console.error(err);
        alert("Network error. Try again later.");
        }

        btn.disabled    = false;
        btn.textContent = "Create Host Account";
        });

    </script>
    
</body>
</html>
