<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Landlord Profile</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f4f4f4;
        }

        header {
            background: linear-gradient(45deg, indigo, darkviolet);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .container {
            max-width: 900px;
            margin: 30px auto;
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .top {
            background: linear-gradient(45deg, indigo, darkviolet);
            text-align: center;
            padding: 30px;
            color: white;
        }

            .top img {
                width: 120px;
                height: 120px;
                border-radius: 50%;
                object-fit: cover;
                border: 4px solid white;
            }

        .content {
            padding: 20px;
        }

        .card {
            background: #f7f7f7;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        button {
            width: 100%;
            padding: 15px;
            background: indigo;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <header>
        <div class="logo-area">
            <button class="menu-btn"
                    onclick="toggleMenu()">
                ☰
            </button>
            <img src="https://eliyasande65-lang.github.io/QejaConnect/logo.jpg" id="logo" alt="logo">

            <div class="brand">
                <h2>Qeja Connect</h2>
                <p>Quality accommodation providence</p>
            </div>

        </div>
    </header>

    <div id="profile"></div>

    <script>
        async function loadProfile() {

        const id = new URLSearchParams(window.location.search).get("id");
        const profile = document.getElementById("profile");

        try {
        const res = await fetch(`https://qeja-backend-azkf.onrender.com/landlords/${id}`);
        const data = await res.json();

        if (!data.success) {
        profile.innerHTML = `<h2 style="text-align:center;">Landlord not found</h2>`;
        return;
        }

        const l = data.landlord;

        // FIX IMAGE FALLBACK PROPERLY
        const img = l.profile_pic
        ? l.profile_pic
        : "https://eliyasande65-lang.github.io/QejaConnect/default-user.png";

        profile.innerHTML = `
        <div class="container">

        <div class="top">
        <img src="${img}">
        <h2>${l.fullname}</h2>
        <p>✔ Verified Host</p>
        </div>

        <div class="content">

        <div class="card"><b>Email:</b> ${l.email}</div>
        <div class="card"><b>Phone:</b> ${l.phone}</div>
        <div class="card"><b>Location:</b> ${l.town}, ${l.county}</div>
        <div class="card"><b>Property:</b> ${l.property_name}</div>

        <button onclick="alert('Contact feature coming soon')">
        Contact Host
        </button>

        </div>

        </div>
        `;

        } catch (err) {
        profile.innerHTML = `<h2 style="text-align:center;">Failed to load profile</h2>`;
        }
        }

        loadProfile();
    </script>

</body>
</html>
