<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landlord Profile | Qeja Connect</title>

    <style>

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
        }

        header {
            background: linear-gradient(45deg, indigo, darkviolet);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .profile-container {
            max-width: 900px;
            margin: 40px auto;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        .top-section {
            background: linear-gradient(45deg, indigo, darkviolet);
            padding: 40px 20px;
            text-align: center;
            color: white;
        }

            .top-section img {
                width: 140px;
                height: 140px;
                border-radius: 50%;
                object-fit: cover;
                border: 5px solid white;
                background: white;
            }

            .top-section h1 {
                margin-top: 15px;
                margin-bottom: 10px;
            }

        .verified {
            background: limegreen;
            display: inline-block;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }

        .details {
            padding: 30px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background: #f8f8f8;
            padding: 20px;
            border-radius: 15px;
        }

            .card h3 {
                margin-top: 0;
                color: indigo;
            }

        .about {
            margin-top: 30px;
            background: #fafafa;
            padding: 20px;
            border-radius: 15px;
            line-height: 1.7;
        }

        .properties {
            margin-top: 30px;
        }

        .property-box {
            background: #f8f8f8;
            padding: 20px;
            border-radius: 15px;
            margin-top: 15px;
        }

        button {
            margin-top: 20px;
            padding: 14px 20px;
            border: none;
            border-radius: 10px;
            background: indigo;
            color: white;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }

            button:hover {
                background: darkviolet;
            }

        footer {
            margin-top: 40px;
            background: #111;
            color: white;
            text-align: center;
            padding: 25px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Qeja Connect</h1>
    </header>

    <div id="profile"></div>

    <footer>
        © 2026 Qeja Connect Kenya Ltd.
    </footer>

    <script>

        async function loadProfile() {

        const params = new URLSearchParams(window.location.search);

        const id = params.get("id");

        const profile = document.getElementById("profile");

        try {

        const res = await fetch(
        `https://qeja-backend-azkf.onrender.com/landlords/${id}`
        );

        const data = await res.json();

        if (!data.success || !data.landlord) {

        profile.innerHTML = `
        <h2 style="text-align:center;margin-top:50px;">
        Landlord not found
        </h2>
        `;

        return;
        }

        const l = data.landlord;

        profile.innerHTML = `

        <div class="profile-container">

        <div class="top-section">

        <img
        src="${l.profile_pic || 'https://eliyasande65-lang.github.io/QejaConnect/default-user.png'}"
        >

        <h1>${l.fullname || "Unknown Host"}</h1>

        <div class="verified">
        ✔ Verified Host
        </div>

        </div>

        <div class="details">

        <div class="info-grid">

        <div class="card">
        <h3>Email</h3>
        <p>${l.email || "Not available"}</p>
        </div>

        <div class="card">
        <h3>Phone</h3>
        <p>${l.phone || "Not available"}</p>
        </div>

        <div class="card">
        <h3>Location</h3>
        <p>
        ${l.town || "Unknown"},
        ${l.county || ""}
        </p>
        </div>

        <div class="card">
        <h3>Property</h3>
        <p>
        ${l.property_name || "No property listed"}
        </p>
        </div>

        </div>

        <div class="about">

        <h2>About Host</h2>

        <p>
        ${l.description || "This landlord has not added a description yet."}
        </p>

        </div>

        <div class="properties">

        <h2>Properties</h2>

        <div class="property-box">

        <h3>
        ${l.property_name || "Property"}
        </h3>

        <p>
        Located in ${l.town || "Unknown area"}.
        </p>

        </div>

        </div>

        <button>
        Contact Host
        </button>

        </div>

        </div>

        `;

        } catch(err) {

        console.error(err);

        profile.innerHTML = `
        <h2 style="text-align:center;margin-top:50px;">
        Failed to load landlord profile
        </h2>
        `;
        }
        }

        loadProfile();

    </script>

</body>
</html>
