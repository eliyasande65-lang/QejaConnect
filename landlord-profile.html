<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- ============================================================
     QejaConnect PWA — paste this block inside <head> on EVERY page
     ============================================================ -->
    <!-- PWA Manifest -->
    <link rel="manifest" href="/QejaConnect/manifest.json">

    <!-- Theme colour (browser chrome / Android status bar) -->
    <meta name="theme-color" content="#4f46e5">

    <!-- iOS home-screen support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="QejaConnect">
    <link rel="apple-touch-icon" href="/QejaConnect/logo.jpg">

    <!-- Register Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
        navigator.serviceWorker.register('/QejaConnect/sw.js')
        .then(reg => console.log('SW registered:', reg.scope))
        .catch(err => console.error('SW error:', err));
        });
        }
    </script>

    <!-- ============================================================
         END QejaConnect PWA block
         ============================================================ -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landlord Profile | Qeja Connect</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial;
            margin: 0;
            background: #f4f4f4;
        }

        header {
            background: #1a1535;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
        }

        .menu-btn {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 12px;
            background: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            z-index: 10001;
            flex-shrink: 0;
        }

        #logo {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            object-fit: cover;
        }

        .brand {
            color: white;
        }

            .brand h2 {
                margin: 0;
            }

            .brand p {
                margin: 0;
                font-size: 14px;
                opacity: 0.9;
            }

        .side-menu {
            position: fixed;
            top: 0;
            left: -260px;
            width: 260px;
            height: 100%;
            background: #1b1b1b;
            z-index: 9999;
            transition: 0.3s;
            padding-top: 80px;
            box-shadow: 0 0 10px rgba(0,0,0,0.4);
        }

            .side-menu.active {
                left: 0;
            }

            .side-menu a {
                display: block;
                color: white;
                text-decoration: none;
                padding: 18px 25px;
                border-bottom: 1px solid #333;
                font-size: 16px;
            }

                .side-menu a:hover {
                    background: indigo;
                }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            z-index: 9998;
        }

            .overlay.active {
                display: block;
            }

        .container {
            max-width: 900px;
            margin: 30px auto;
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .top-banner {
            background: #1a1535;
            text-align: center;
            padding: 30px;
            color: white;
        }

            .top-banner img {
                width: 120px;
                height: 120px;
                border-radius: 50%;
                object-fit: cover;
                border: 4px solid white;
            }

        .content {
            padding: 25px;
        }

        .info-card {
            background: #f7f7f7;
            padding: 15px 18px;
            border-radius: 10px;
            margin-bottom: 12px;
            font-size: 15px;
        }

            .info-card b {
                color: indigo;
            }

        .action-btn {
            width: 100%;
            padding: 15px;
            background: #1a1535;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            margin-top: 10px;
        }

            .action-btn:hover {
                background: darkviolet;
            }

            .action-btn.secondary {
                background: white;
                color: #1a1535;
                border: 2px solid #1a1535;
            }

                .action-btn.secondary:hover {
                    background: #f0f0ff;
                }

        .error-state, .loader {
            text-align: center;
            padding: 60px 20px;
            color: gray;
        }

        /* ============================================================
           Toast notifications
           ============================================================ */
        #toast-container {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
            width: 100%;
            padding: 0 16px;
            pointer-events: none;
        }

        .toast {
            pointer-events: auto;
            max-width: 380px;
            width: 100%;
            background: #1a1535;
            color: white;
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 14px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.25);
            display: flex;
            align-items: center;
            gap: 10px;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.25s ease, transform 0.25s ease;
        }

            .toast.show {
                opacity: 1;
                transform: translateY(0);
            }

            .toast.error {
                background: #7a1f2b;
            }

            .toast.success {
                background: #1f6d3a;
            }

            .toast .toast-icon {
                font-size: 18px;
                flex-shrink: 0;
            }

        @media(max-width: 480px) {
            .toast {
                max-width: 100%;
                font-size: 13.5px;
            }
        }
    </style>
</head>

<body>

    <header>
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
        <img src="logo.jpg" id="logo">
        <div class="brand">
            <h2>Qeja Connect</h2>
            <p>Quality accommodation providence</p>
        </div>
    </header>

    <div class="overlay" id="overlay" onclick="closeMenu()"></div>

    <div class="side-menu" id="sideMenu">
        <a href="home.html">Home</a>
        <a href="landlords.html">Landlords</a>
        <a href="contact.html">Contact</a>
        <a href="hostdashboard.html">Dashboard</a>
        <a href="myprofile.html">Profile</a>
        <a href="mymessages.html">Notifications</a>
        <a href="welcome.html">Log out</a>
    </div>

    <div id="profile">
        <div class="loader">Loading profile...</div>
    </div>

    <!-- Toast container -->
    <div id="toast-container"></div>

    <script>

        // ============================================================
        // Toast helper
        // ============================================================
        function showToast(message, type = "default", duration = 3200) {
        const container = document.getElementById("toast-container");

        const toast = document.createElement("div");
        toast.className = "toast" + (type !== "default" ? " " + type : "");

        const icon = type === "error" ? "⚠️" : (type === "success" ? "✅" : "ℹ️");
        toast.innerHTML = `<span class="toast-icon">${icon}</span><span>${message}</span>`;

        container.appendChild(toast);

        // trigger enter animation
        requestAnimationFrame(() => toast.classList.add("show"));

        setTimeout(() => {
        toast.classList.remove("show");
        setTimeout(() => toast.remove(), 300);
        }, duration);
        }

        async function loadProfile() {

        const profileDiv = document.getElementById("profile");
        const id = new URLSearchParams(window.location.search).get("id");

        if (!id) {
        profileDiv.innerHTML = `<div class="error-state">No landlord ID provided.</div>`;
        return;
        }

        try {

        const res = await fetch(
        `https://qeja-backend-azkf.onrender.com/landlords/${id}`
        );

        const data = await res.json();

        if (!data.success || !data.landlord) {
        profileDiv.innerHTML = `<div class="error-state">Landlord not found.</div>`;
        return;
        }

        const l = data.landlord;

        const img = l.profile_pic
        ? l.profile_pic
        : "default-user.png";

        profileDiv.innerHTML = `
        <div class="container">

        <div class="top-banner">
        <img src="${img}">
        <h2>${l.fullname}</h2>
        <p>✔ Verified Host</p>
        </div>

        <div class="content">

        <div class="info-card"><b>Email:</b> ${l.email}</div>
        <div class="info-card"><b>Phone:</b> ${l.phone || "Not provided"}</div>
        <div class="info-card"><b>Location:</b> ${l.town || "—"}, ${l.county || "—"}</div>
        <div class="info-card"><b>Property:</b> ${l.property_name || "Not listed"}</div>
        <div class="info-card"><b>Type:</b> ${l.property_type || "—"}</div>
        <div class="info-card"><b>Units:</b> ${l.units || "—"}</div>

        ${l.description ? `<div class="info-card"><b>About:</b> ${l.description}</div>` : ""}

        <button class="action-btn" onclick='startChat(${l.id}, ${JSON.stringify(l.fullname)})'>
        💬 Message This Landlord
        </button>

        

        </div>
        </div>
        `;

        } catch (err) {
        profileDiv.innerHTML = `<div class="error-state">Failed to load profile.</div>`;
        }
        }

        async function startChat(landlord_id, landlord_name) {

        const token = localStorage.getItem("token");
        const loggedUser = JSON.parse(localStorage.getItem("loggedUser"));

        if (!token || !loggedUser) {
        showToast("Please log in to start a conversation.", "error");
        setTimeout(() => location.href = "welcome.html", 1200);
        return;
        }

        // Prevent self-messaging
        if (Number(loggedUser.id) === Number(landlord_id)) {
        showToast("You can't message yourself on your own listing.", "error");
        return;
        }

        try {

        const res = await fetch(
        "https://qeja-backend-azkf.onrender.com/interested",
        {
        method: "POST",
        headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
        },
        body: JSON.stringify({
        landlord_id,
        tenant_id: loggedUser.id,
        message: "Hi, I am interested in your property"
        })
        }
        );

        const data = await res.json();

        if (data.success) {
        localStorage.setItem("conversation_id", data.conversation_id);
        localStorage.setItem("chat_partner_name", landlord_name || "Landlord");
        location.href = "chat-tenant.html";
        } else {
        showToast(data.message || "Could not start chat", "error");
        }

        } catch (err) {
        showToast("Network error. Please try again.", "error");
        }
        }

        async function bookProperty(landlord_id, landlord_name, property_name) {

        const token = localStorage.getItem("token");
        const loggedUser = JSON.parse(localStorage.getItem("loggedUser"));

        if (!token || !loggedUser) {
        showToast("Please log in to book a property.", "error");
        setTimeout(() => location.href = "welcome.html", 1200);
        return;
        }

        // Prevent self-booking
        if (Number(loggedUser.id) === Number(landlord_id)) {
        showToast("You can't book your own property.", "error");
        return;
        }

        try {

        const res = await fetch(
        "https://qeja-backend-azkf.onrender.com/bookings",
        {
        method: "POST",
        headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
        },
        body: JSON.stringify({
        landlord_id,
        tenant_id: loggedUser.id,
        property_name
        })
        }
        );

        const data = await res.json();

        if (data.success) {
        showToast(`Booking request sent for ${property_name}!`, "success");
        } else {
        showToast(data.message || "Could not complete booking", "error");
        }

        } catch (err) {
        showToast("Network error. Please try again.", "error");
        }
        }

        function toggleMenu() {
        document.getElementById("sideMenu").classList.toggle("active");
        document.getElementById("overlay").classList.toggle("active");
        }

        function closeMenu() {
        document.getElementById("sideMenu").classList.remove("active");
        document.getElementById("overlay").classList.remove("active");
        }

        loadProfile();

    </script>


</body>
</html>
