<body>

    <div class="page">

        <div class="container">

            <h1>Login to continue</h1>

            <form id="loginForm">

                <input type="email" name="email" placeholder="Email" required>
                <input type="password" name="password" placeholder="Password" required>

                <button type="submit">Login</button>

                <p style="color:white;">
                    No account?
                    <a href="welcome.html" style="color:yellow;">Sign up</a>
                </p>

            </form>

            <p>Company Email: qejaconnect@outlook.com</p>
            <p>Hotline: +254714 104 737</p>
            <p>Hotline 2: +25471 203 443</p>
            <p><em>Regulated by Communication Authority of Kenya</em></p>
        </div>

    </div>

    <script>

        document.getElementById("loginForm")
        .addEventListener("submit", async function(e) {

        e.preventDefault();

        const formData = {
        email: this.email.value,
        password: this.password.value
        };

        try {

        const response = await fetch(
        "https://qeja-backend-azkf.onrender.com/login",
        {
        method: "POST",
        headers: {
        "Content-Type": "application/json"
        },
        body: JSON.stringify(formData)
        });

        const data = await response.json();

        if(response.ok){

        alert("Login successful");

        localStorage.setItem("token", data.token);
        localStorage.setItem("role", data.role);
        localStorage.setItem("loggedUser", JSON.stringify(data.user));

        if(data.role === "landlord"){
        window.location.href =
        "hostdashboard.html";
        } else {
        window.location.href =
        "home.html";
        }

        } else {
        alert(data.message || "Invalid email or password");
        }

        } catch(error){
        console.log(error);
        alert("Server error. Please try again later.");
        }

        });

    </script>
