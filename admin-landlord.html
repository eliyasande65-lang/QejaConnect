<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Landlords & Withdrawals | Qeja Connect</title>
    <script>
        (function () {
        let secret = localStorage.getItem('admin_secret');
        if (!secret) {
        secret = prompt('🛡️ Enter Admin Secret:');
        if (!secret) { window.location.replace('login.html'); return; }
        localStorage.setItem('admin_secret', secret);
        }
        })();
    </script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --navy: #1a1535;
            --navy2: #13102a;
            --indigo: #4f46e5;
            --purple: #7c3aed;
            --bg: #0d0a1a;
            --surface: #13102a;
            --card: #1a1535;
            --border: rgba(139,92,246,0.18);
            --text: #f1f0f7;
            --muted: #8b84a8;
            --green: #10b981;
            --amber: #f59e0b;
            --red: #ef4444;
            --dim: rgba(255,255,255,0.05);
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── HEADER ── */
        header {
            background: var(--navy2);
            border-bottom: 1px solid var(--border);
            padding: 0 28px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 200;
            box-shadow: 0 4px 24px rgba(0,0,0,0.4);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-badge {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            box-shadow: 0 4px 16px rgba(124,58,237,0.4);
        }

        .brand-name {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
        }

        .brand-tag {
            font-size: 11px;
            color: var(--muted);
        }

        .admin-badge {
            background: linear-gradient(135deg, rgba(124,58,237,0.3), rgba(79,70,229,0.3));
            border: 1px solid rgba(124,58,237,0.4);
            color: #c4b5fd;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        .header-right {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .back-btn {
            color: var(--muted);
            text-decoration: none;
            font-size: 13px;
            background: var(--dim);
            padding: 7px 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            transition: all 0.2s;
        }

            .back-btn:hover {
                color: var(--text);
                border-color: rgba(124,58,237,0.4);
            }

        /* ── TABS ── */
        .tabs {
            display: flex;
            gap: 0;
            border-bottom: 1px solid var(--border);
            padding: 0 28px;
            background: var(--surface);
        }

        .tab-btn {
            padding: 14px 20px;
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            color: var(--muted);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            white-space: nowrap;
        }

            .tab-btn:hover {
                color: var(--text);
            }

            .tab-btn.active {
                color: #a78bfa;
                border-bottom-color: #7c3aed;
            }

        .tab-badge {
            background: rgba(124,58,237,0.25);
            color: #c4b5fd;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
        }

            .tab-badge.amber {
                background: rgba(245,158,11,0.2);
                color: #fcd34d;
            }

            .tab-badge.red {
                background: rgba(239,68,68,0.2);
                color: #fca5a5;
            }

        /* ── PAGE ── */
        .page {
            max-width: 1200px;
            margin: 0 auto;
            padding: 28px 20px;
        }

        .tab-panel {
            display: none;
        }

            .tab-panel.active {
                display: block;
            }

        /* ── STAT ROW ── */
        .stat-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 14px;
            margin-bottom: 28px;
        }

        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px 16px;
            text-align: center;
            border-top: 3px solid var(--purple);
        }

            .stat-card.green {
                border-top-color: var(--green);
            }

            .stat-card.amber {
                border-top-color: var(--amber);
            }

            .stat-card.red {
                border-top-color: var(--red);
            }

        .stat-num {
            font-size: 1.7rem;
            font-weight: 800;
            color: var(--purple);
        }

        .stat-card.green .stat-num {
            color: var(--green);
        }

        .stat-card.amber .stat-num {
            color: var(--amber);
        }

        .stat-card.red .stat-num {
            color: var(--red);
        }

        .stat-lbl {
            font-size: 11px;
            color: var(--muted);
            margin-top: 4px;
        }

        /* ── SEARCH ── */
        .search-bar {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

            .search-bar input {
                flex: 1;
                min-width: 200px;
                padding: 10px 16px;
                background: var(--dim);
                border: 1px solid var(--border);
                border-radius: 10px;
                color: var(--text);
                font-size: 14px;
                outline: none;
            }

                .search-bar input:focus {
                    border-color: var(--purple);
                    box-shadow: 0 0 0 3px rgba(124,58,237,0.15);
                }

                .search-bar input::placeholder {
                    color: var(--muted);
                }

        .filter-select {
            padding: 10px 14px;
            background: var(--dim);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 13px;
            outline: none;
            cursor: pointer;
        }

        /* ── LANDLORD CARD ── */
        .landlord-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            margin-bottom: 16px;
            overflow: hidden;
            transition: border-color 0.2s;
        }

            .landlord-card:hover {
                border-color: rgba(124,58,237,0.4);
            }

        .landlord-header {
            padding: 18px 22px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            user-select: none;
        }

        .landlord-avatar {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: linear-gradient(135deg, #7c3aed22, #4f46e522);
            border: 1px solid rgba(124,58,237,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            flex-shrink: 0;
        }

        .landlord-info {
            flex: 1;
            min-width: 0;
        }

        .landlord-name {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
        }

        .landlord-meta {
            font-size: 12px;
            color: var(--muted);
            margin-top: 3px;
        }

        .landlord-stats {
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
        }

        .ls-pill {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
        }

        .ls-green {
            background: rgba(16,185,129,0.15);
            color: #34d399;
        }

        .ls-amber {
            background: rgba(245,158,11,0.15);
            color: #fbbf24;
        }

        .ls-red {
            background: rgba(239,68,68,0.15);
            color: #f87171;
        }

        .ls-purple {
            background: rgba(124,58,237,0.15);
            color: #a78bfa;
        }

        .landlord-chevron {
            color: var(--muted);
            font-size: 1rem;
            transition: transform 0.2s;
            flex-shrink: 0;
        }

        .landlord-card.expanded .landlord-chevron {
            transform: rotate(180deg);
        }

        /* ── TENANCY DETAILS PANEL ── */
        .tenancy-panel {
            display: none;
            padding: 0 22px 22px;
            border-top: 1px solid var(--border);
        }

        .landlord-card.expanded .tenancy-panel {
            display: block;
        }

        .tenancy-panel-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin: 18px 0 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

            .tenancy-panel-title::after {
                content: '';
                flex: 1;
                height: 1px;
                background: var(--border);
            }

        /* TENANCY ROW */
        .tenancy-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 18px;
            margin-bottom: 12px;
        }

        .tenancy-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }

        .tenancy-prop {
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--text);
        }

        .tenancy-tenant {
            font-size: 12px;
            color: var(--muted);
            margin-top: 3px;
        }

        .tenancy-rent {
            font-size: 1rem;
            font-weight: 800;
            color: var(--green);
            white-space: nowrap;
        }

        /* MONTH GRID */
        .month-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .month-cell {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 52px;
            padding: 6px 4px;
            border-radius: 8px;
            font-size: 10px;
            border: 1px solid transparent;
            cursor: default;
            transition: all 0.15s;
        }

            .month-cell:hover {
                transform: translateY(-2px);
            }

        .mc-paid {
            background: rgba(16,185,129,0.15);
            border-color: rgba(16,185,129,0.3);
            color: #34d399;
        }

        .mc-pending {
            background: rgba(245,158,11,0.1);
            border-color: rgba(245,158,11,0.25);
            color: #fbbf24;
        }

        .mc-overdue {
            background: rgba(239,68,68,0.12);
            border-color: rgba(239,68,68,0.3);
            color: #f87171;
        }

        .mc-future {
            background: rgba(255,255,255,0.04);
            border-color: rgba(255,255,255,0.08);
            color: var(--muted);
        }

        .mc-icon {
            font-size: 14px;
            margin-bottom: 2px;
        }

        .mc-label {
            font-weight: 600;
            text-align: center;
            line-height: 1.2;
        }

        /* MONTH LEGEND */
        .month-legend {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .ml-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            color: var(--muted);
        }

        .ml-dot {
            width: 10px;
            height: 10px;
            border-radius: 3px;
        }

        .ml-paid {
            background: #10b981;
        }

        .ml-overdue {
            background: #ef4444;
        }

        .ml-pending {
            background: #f59e0b;
        }

        .ml-future {
            background: #333;
        }

        /* ── WITHDRAWAL SECTION ── */
        .wd-request-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 22px;
            margin-bottom: 14px;
            display: flex;
            gap: 18px;
            align-items: flex-start;
            flex-wrap: wrap;
        }

        .wd-avatar {
            width: 50px;
            height: 50px;
            border-radius: 14px;
            background: linear-gradient(135deg, rgba(124,58,237,0.3), rgba(79,70,229,0.3));
            border: 1px solid rgba(124,58,237,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .wd-info {
            flex: 1;
            min-width: 200px;
        }

        .wd-name {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 4px;
        }

        .wd-meta {
            font-size: 12px;
            color: var(--muted);
            line-height: 1.7;
        }

            .wd-meta strong {
                color: var(--text);
            }

        .wd-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
        }

        .wd-amount-big {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--purple);
        }

        .wd-method-tag {
            background: rgba(124,58,237,0.15);
            color: #a78bfa;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
        }

        .wd-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 14px;
            width: 100%;
        }

        .btn-mark-paid {
            padding: 9px 20px;
            border: none;
            border-radius: 9px;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.15s;
            box-shadow: 0 4px 16px rgba(16,185,129,0.3);
        }

            .btn-mark-paid:hover {
                opacity: 0.9;
                transform: translateY(-1px);
            }

            .btn-mark-paid.loading {
                opacity: 0.5;
                pointer-events: none;
            }

        .btn-reject {
            padding: 9px 18px;
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 9px;
            background: rgba(239,68,68,0.1);
            color: #f87171;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

            .btn-reject:hover {
                background: rgba(239,68,68,0.2);
                border-color: rgba(239,68,68,0.5);
            }

        .btn-add-note {
            padding: 9px 18px;
            border: 1px solid var(--border);
            border-radius: 9px;
            background: var(--dim);
            color: var(--muted);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

            .btn-add-note:hover {
                color: var(--text);
                border-color: rgba(124,58,237,0.4);
            }

        .wd-status-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
        }

        .wsb-pending {
            background: rgba(245,158,11,0.15);
            color: #fbbf24;
            border: 1px solid rgba(245,158,11,0.3);
        }

        .wsb-paid {
            background: rgba(16,185,129,0.15);
            color: #34d399;
            border: 1px solid rgba(16,185,129,0.3);
        }

        .wsb-rejected {
            background: rgba(239,68,68,0.15);
            color: #f87171;
            border: 1px solid rgba(239,68,68,0.3);
        }

        /* NOTE MODAL */
        .note-modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 600;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

            .note-modal-overlay.open {
                display: flex;
            }

        .note-modal {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            width: 100%;
            max-width: 420px;
            padding: 28px;
            box-shadow: 0 24px 80px rgba(0,0,0,0.5);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .note-modal h3 {
            font-size: 1rem;
            color: var(--text);
            margin-bottom: 16px;
        }

        .note-modal textarea {
            width: 100%;
            padding: 12px;
            background: var(--dim);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 14px;
            resize: vertical;
            min-height: 100px;
            outline: none;
            font-family: inherit;
        }

            .note-modal textarea:focus {
                border-color: var(--purple);
            }

        .note-modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }

        .btn-nm-cancel {
            flex: 1;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 9px;
            background: var(--dim);
            color: var(--muted);
            cursor: pointer;
            font-size: 13px;
        }

        .btn-nm-save {
            flex: 2;
            padding: 10px;
            border: none;
            border-radius: 9px;
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            color: white;
            cursor: pointer;
            font-weight: 700;
            font-size: 13px;
        }

        /* LOADER / EMPTY */
        .loader {
            text-align: center;
            padding: 40px;
            color: var(--muted);
            font-style: italic;
        }

        .empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
        }

            .empty .icon {
                font-size: 3.5rem;
                margin-bottom: 12px;
            }

            .empty h3 {
                font-size: 1rem;
                margin-bottom: 6px;
                color: var(--text);
            }

        /* TOAST */
        #toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 13px 20px;
            border-radius: 14px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.5);
            z-index: 900;
            max-width: 380px;
            width: 90%;
            opacity: 0;
            pointer-events: none;
            transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
        }

            #toast.show {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }

            #toast.success {
                border-left: 4px solid var(--green);
            }

            #toast.error {
                border-left: 4px solid var(--red);
            }

            #toast.warning {
                border-left: 4px solid var(--amber);
            }

            #toast.info {
                border-left: 4px solid #a78bfa;
            }

        @media (max-width: 680px) {
            .tabs {
                padding: 0 16px;
                overflow-x: auto;
            }

            .tab-btn {
                padding: 12px 14px;
                font-size: 12px;
            }

            .landlord-stats {
                display: none;
            }

            .month-cell {
                width: 44px;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <div class="logo-badge">🏠</div>
            <div>
                <div class="brand-name">QejaConnect</div>
                <div class="brand-tag">Administration Panel</div>
            </div>
        </div>
        <div class="header-right">
            <span class="admin-badge">🛡️ ADMIN</span>
            <a href="admin_dashboard.html" class="back-btn">← Dashboard</a>
        </div>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('landlords', this)">
            🏠 Active Landlords <span class="tab-badge" id="tab-ll-count">—</span>
        </button>
        <button class="tab-btn" onclick="switchTab('withdrawals', this)">
            💸 Withdrawal Requests <span class="tab-badge amber" id="tab-wd-count">—</span>
        </button>
        <button class="tab-btn" onclick="switchTab('history', this)">
            📋 Processed Withdrawals
        </button>
    </div>

    <div class="page">

        <!-- ══ TAB 1: LANDLORDS ══ -->
        <div class="tab-panel active" id="panel-landlords">
            <div class="stat-row" id="llStatRow">
                <div class="stat-card"><div class="stat-num" id="stLandlords">—</div><div class="stat-lbl">Active Landlords</div></div>
                <div class="stat-card green"><div class="stat-num" id="stCollected">—</div><div class="stat-lbl">Total Collected (Ksh)</div></div>
                <div class="stat-card amber"><div class="stat-num" id="stPending">—</div><div class="stat-lbl">Pending Payments</div></div>
                <div class="stat-card red"><div class="stat-num" id="stOverdue">—</div><div class="stat-lbl">Overdue Payments</div></div>
            </div>
            <div class="search-bar">
                <input type="text" id="llSearch" placeholder="🔍  Search landlord name, email, property…" oninput="filterLandlords()">
                <select class="filter-select" id="llFilter" onchange="filterLandlords()">
                    <option value="all">All Landlords</option>
                    <option value="withOverdue">Has Overdue</option>
                    <option value="allPaid">Fully Paid</option>
                </select>
            </div>
            <div id="landlordList"><div class="loader">Loading landlords…</div></div>
        </div>

        <!-- ══ TAB 2: PENDING WITHDRAWALS ══ -->
        <div class="tab-panel" id="panel-withdrawals">
            <div class="stat-row">
                <div class="stat-card amber"><div class="stat-num" id="stWdPending">—</div><div class="stat-lbl">Pending Requests</div></div>
                <div class="stat-card purple" style="border-top-color:#7c3aed;"><div class="stat-num" id="stWdTotal" style="color:#a78bfa;">—</div><div class="stat-lbl">Total Requested (Ksh)</div></div>
            </div>
            <div id="withdrawalRequests"><div class="loader">Loading withdrawal requests…</div></div>
        </div>

        <!-- ══ TAB 3: PROCESSED ══ -->
        <div class="tab-panel" id="panel-history">
            <div id="withdrawalHistory"><div class="loader">Loading…</div></div>
        </div>

    </div>

    <!-- NOTE MODAL -->
    <div class="note-modal-overlay" id="noteModal">
        <div class="note-modal">
            <h3>📝 Add Admin Note</h3>
            <textarea id="noteText" placeholder="E.g. 'Paid via M-Pesa on 17 Jun 2026, ref QA8X9Y3'…"></textarea>
            <div class="note-modal-actions">
                <button class="btn-nm-cancel" onclick="closeNoteModal()">Cancel</button>
                <button class="btn-nm-save" onclick="saveNote()">Save Note</button>
            </div>
        </div>
    </div>

    <div id="toast">
        <span id="toast-icon"></span>
        <span id="toast-msg"></span>
    </div>

    <script>
        const API   = 'https://qeja-backend-azkf.onrender.com';
        const adminSecret = localStorage.getItem('admin_secret');
        let allLandlordData   = [];
        let allWithdrawals    = [];
        let noteTargetId      = null;
        let toastTimer;

        // ── TOAST ──────────────────────────────────────────────
        function showToast(message, type = 'info', dur = 3500) {
        const toast = document.getElementById('toast');
        const icons = { success:'✅', error:'❌', info:'ℹ️', warning:'⚠️' };
        toast.className = '';
        toast.classList.add(type);
        document.getElementById('toast-icon').textContent = icons[type] || 'ℹ️';
        document.getElementById('toast-msg').textContent  = message;
        void toast.offsetWidth;
        toast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove('show'), dur);
        }

        // ── TABS ──────────────────────────────────────────────
        function switchTab(name, btn) {
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('panel-' + name).classList.add('active');
        btn.classList.add('active');
        if (name === 'withdrawals') loadWithdrawals('pending');
        if (name === 'history')     loadWithdrawals('processed');
        }

        // ── LOAD LANDLORDS ─────────────────────────────────────
        async function loadLandlords() {
        try {
        const res  = await fetch(`${API}/admin/landlords`, {
        headers: { 'x-admin-secret': adminSecret }
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.message);

        allLandlordData = data.landlords || [];
        document.getElementById('tab-ll-count').textContent = allLandlordData.length;
        document.getElementById('stLandlords').textContent  = allLandlordData.length;

        // Compute global stats
        let totalCollected = 0, totalPending = 0, totalOverdue = 0;
        allLandlordData.forEach(ll => {
        totalCollected += ll.total_collected || 0;
        totalPending   += ll.pending_count   || 0;
        totalOverdue   += ll.overdue_count   || 0;
        });
        document.getElementById('stCollected').textContent = totalCollected.toLocaleString();
        document.getElementById('stPending').textContent   = totalPending;
        document.getElementById('stOverdue').textContent   = totalOverdue;

        renderLandlords(allLandlordData);
        } catch(e) {
        document.getElementById('landlordList').innerHTML = `<div class="empty"><div class="icon">⚠️</div><h3>Failed to load landlords.</h3><p>${e.message}</p></div>`;
        }
        }

        function renderLandlords(landlords) {
        const container = document.getElementById('landlordList');
        if (!landlords.length) {
        container.innerHTML = `<div class="empty"><div class="icon">🏠</div><h3>No landlords found.</h3></div>`;
        return;
        }
        container.innerHTML = landlords.map(ll => buildLandlordCard(ll)).join('');
        }

        function buildLandlordCard(ll) {
        const tenancies = ll.tenancies || [];
        const paidCount    = ll.paid_count    || 0;
        const pendingCount = ll.pending_count || 0;
        const overdueCount = ll.overdue_count || 0;
        const totalCollected = ll.total_collected || 0;

        const tenancyRows = tenancies.length
        ? tenancies.map(t => buildTenancyRow(t, ll)).join('')
        : `<div class="loader" style="padding:20px 0;">No active tenancies.</div>`;

        return `
        <div class="landlord-card" id="llcard-${ll.id}">
        <div class="landlord-header" onclick="toggleCard(${ll.id})">
        <div class="landlord-avatar">🏠</div>
        <div class="landlord-info">
        <div class="landlord-name">${ll.fullname || 'Landlord'}</div>
        <div class="landlord-meta">📧 ${ll.email || '—'} &nbsp;·&nbsp; 📱 ${ll.phone || '—'} &nbsp;·&nbsp; ${tenancies.length} tenancy session${tenancies.length !== 1 ? 's' : ''}</div>
        </div>
        <div class="landlord-stats">
        <span class="ls-pill ls-green">✅ ${paidCount} paid</span>
        ${pendingCount ? `<span class="ls-pill ls-amber">⏳ ${pendingCount} pending</span>` : ''}
        ${overdueCount ? `<span class="ls-pill ls-red">❌ ${overdueCount} overdue</span>` : ''}
        <span class="ls-pill ls-purple">💰 Ksh ${totalCollected.toLocaleString()}</span>
        </div>
        <div class="landlord-chevron">▼</div>
        </div>
        <div class="tenancy-panel">
        <div class="tenancy-panel-title">Tenancy Sessions &amp; Monthly Payment Status</div>
        ${tenancyRows}
        <div class="month-legend">
        <div class="ml-item"><div class="ml-dot ml-paid"></div> Paid</div>
        <div class="ml-item"><div class="ml-dot ml-overdue"></div> Overdue</div>
        <div class="ml-item"><div class="ml-dot ml-pending"></div> Pending</div>
        <div class="ml-item"><div class="ml-dot ml-future"></div> Upcoming</div>
        </div>
        </div>
        </div>`;
        }

        function buildTenancyRow(t, ll) {
        const payments = t.payments || [];
        const start    = new Date(t.start_date);
        const dur      = t.duration_months || 12;
        const now      = new Date();

        let cells = '';
        for (let i = 0; i < dur; i++) {
        const due  = new Date(start); due.setMonth(due.getMonth() + i); due.setDate(1);
        const paid = payments.find(p => p.month_index === i || p.month_number === i + 1);
        const isFuture = due > now;
        let cls = 'mc-future', icon = '○';
        if (paid)            { cls = 'mc-paid';    icon = '✓'; }
        else if (!isFuture)  { cls = 'mc-overdue'; icon = '!'; }
        else                 { cls = 'mc-pending'; icon = '○'; }
        const lbl = due.toLocaleDateString('en-KE', { month: 'short' });
        const yr  = due.getFullYear().toString().slice(-2);
        const tip = `${lbl} '${yr}${paid ? ' · ' + (paid.mpesa_ref || 'Ref N/A') : ''}`;
        cells += `<div class="month-cell ${cls}" title="${tip}"><div class="mc-icon">${icon}</div><div class="mc-label">${lbl}<br>'${yr}</div></div>`;
        }

        return `
        <div class="tenancy-item">
        <div class="tenancy-top">
        <div>
        <div class="tenancy-prop">🏢 ${t.property_title || 'Property'}</div>
        <div class="tenancy-tenant">Tenant: ${t.tenant_name || '—'} &nbsp;·&nbsp; ${t.tenant_phone || '—'}</div>
        <div class="tenancy-tenant" style="margin-top:2px;">📅 ${formatDate2(t.start_date)} → ${t.duration_months} months</div>
        </div>
        <div class="tenancy-rent">Ksh ${Number(t.rent_amount || 0).toLocaleString()}/mo</div>
        </div>
        <div class="month-grid">${cells}</div>
        </div>`;
        }

        function toggleCard(id) {
        document.getElementById('llcard-' + id).classList.toggle('expanded');
        }

        // ── FILTER LANDLORDS ───────────────────────────────────
        function filterLandlords() {
        const q   = document.getElementById('llSearch').value.toLowerCase();
        const flt = document.getElementById('llFilter').value;
        let filtered = allLandlordData.filter(ll => {
        const match = (ll.fullname || '').toLowerCase().includes(q)
        || (ll.email   || '').toLowerCase().includes(q)
        || (ll.phone   || '').toLowerCase().includes(q)
        || (ll.tenancies || []).some(t => (t.property_title || '').toLowerCase().includes(q));
        if (!match) return false;
        if (flt === 'withOverdue') return (ll.overdue_count || 0) > 0;
        if (flt === 'allPaid')    return (ll.overdue_count || 0) === 0 && (ll.pending_count || 0) === 0;
        return true;
        });
        renderLandlords(filtered);
        }

        // ── LOAD WITHDRAWALS ───────────────────────────────────
        async function loadWithdrawals(mode = 'pending') {
        const containerId = mode === 'pending' ? 'withdrawalRequests' : 'withdrawalHistory';
        document.getElementById(containerId).innerHTML = '<div class="loader">Loading…</div>';
        try {
        const status = mode === 'pending' ? 'pending' : 'paid,rejected';
        const res  = await fetch(`${API}/admin/withdrawals?status=${status}`, {
        headers: { 'x-admin-secret': adminSecret }
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.message);
        allWithdrawals = data.withdrawals || [];

        if (mode === 'pending') {
        const pending = allWithdrawals.filter(w => w.status === 'pending');
        document.getElementById('tab-wd-count').textContent = pending.length;
        document.getElementById('stWdPending').textContent  = pending.length;
        const totalReq = pending.reduce((s,w) => s + Number(w.amount||0), 0);
        document.getElementById('stWdTotal').textContent = totalReq.toLocaleString();
        renderWithdrawals(pending, 'withdrawalRequests', true);
        } else {
        renderWithdrawals(allWithdrawals.filter(w => w.status !== 'pending'), 'withdrawalHistory', false);
        }
        } catch(e) {
        document.getElementById(containerId).innerHTML = `<div class="empty"><div class="icon">⚠️</div><h3>Failed to load.</h3><p>${e.message}</p></div>`;
        }
        }

        function renderWithdrawals(withdrawals, containerId, showActions) {
        const container = document.getElementById(containerId);
        if (!withdrawals.length) {
        const msg = showActions ? 'No pending withdrawal requests. 🎉' : 'No processed withdrawals yet.';
        container.innerHTML = `<div class="empty"><div class="icon">💸</div><h3>${msg}</h3></div>`;
        return;
        }
        const sorted = [...withdrawals].sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
        container.innerHTML = sorted.map(w => buildWithdrawalCard(w, showActions)).join('');
        }

        function buildWithdrawalCard(w, showActions) {
        const statusClass = { pending:'wsb-pending', paid:'wsb-paid', rejected:'wsb-rejected' }[w.status] || 'wsb-pending';
        const statusLabel = { pending:'⏳ Pending', paid:'✅ Paid', rejected:'❌ Rejected' }[w.status] || '⏳ Pending';
        const actionBtns  = showActions ? `
        <div class="wd-actions">
        <button class="btn-mark-paid" id="mppbtn-${w.id}" onclick="markWithdrawalPaid(${w.id})">✅ Mark as Paid</button>
        <button class="btn-reject" onclick="rejectWithdrawal(${w.id})">❌ Reject</button>
        <button class="btn-add-note" onclick="openNoteModal(${w.id})">📝 Add Note</button>
        </div>` : '';

        return `
        <div class="wd-request-card" id="wdcard-${w.id}">
        <div class="wd-avatar">💸</div>
        <div class="wd-info">
        <div class="wd-name">${w.landlord_name || 'Landlord'}</div>
        <div class="wd-meta">
        📱 <strong>${w.phone}</strong> — ${w.account_name || '—'}<br>
        📧 ${w.landlord_email || '—'}<br>
        🗓️ Submitted: ${formatDate(w.created_at)}
        ${w.bank_details ? `<br>🏦 ${w.bank_details}` : ''}
        ${w.note ? `<br>📝 <em>"${w.note}"</em>` : ''}
        ${w.admin_note ? `<br>🛡️ Admin note: <strong style="color:#a78bfa;">${w.admin_note}</strong>` : ''}
        </div>
        ${actionBtns}
        </div>
        <div class="wd-right">
        <div class="wd-amount-big">Ksh ${Number(w.amount).toLocaleString()}</div>
        <span class="wd-method-tag">${(w.method || 'MPESA').toUpperCase()}</span>
        <span class="wd-status-badge ${statusClass}">${statusLabel}</span>
        </div>
        </div>`;
        }

        // ── MARK AS PAID ───────────────────────────────────────
        async function markWithdrawalPaid(wdId) {
        const btn = document.getElementById('mppbtn-' + wdId);
        if (btn) { btn.textContent = 'Processing…'; btn.classList.add('loading'); }
        try {
        const res  = await fetch(`${API}/admin/withdrawals/${wdId}/mark-paid`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-admin-secret': adminSecret }
        });
        const data = await res.json();
        if (data.success) {
        showToast('Withdrawal marked as paid!', 'success');
        loadWithdrawals('pending');
        } else {
        showToast(data.message || 'Failed.', 'error');
        if (btn) { btn.textContent = '✅ Mark as Paid'; btn.classList.remove('loading'); }
        }
        } catch {
        showToast('Network error.', 'error');
        if (btn) { btn.textContent = '✅ Mark as Paid'; btn.classList.remove('loading'); }
        }
        }

        // ── REJECT ─────────────────────────────────────────────
        async function rejectWithdrawal(wdId) {
        if (!confirm('Reject this withdrawal request?')) return;
        try {
        const res  = await fetch(`${API}/admin/withdrawals/${wdId}/reject`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-admin-secret': adminSecret }
        });
        const data = await res.json();
        if (data.success) { showToast('Request rejected.', 'warning'); loadWithdrawals('pending'); }
        else showToast(data.message || 'Failed.', 'error');
        } catch { showToast('Network error.', 'error'); }
        }

        // ── NOTE MODAL ─────────────────────────────────────────
        function openNoteModal(wdId) {
        noteTargetId = wdId;
        document.getElementById('noteText').value = '';
        document.getElementById('noteModal').classList.add('open');
        }
        function closeNoteModal() {
        document.getElementById('noteModal').classList.remove('open');
        noteTargetId = null;
        }
        document.getElementById('noteModal').addEventListener('click', function(e) {
        if (e.target === this) closeNoteModal();
        });
        async function saveNote() {
        const note = document.getElementById('noteText').value.trim();
        if (!note || !noteTargetId) return;
        try {
        const res  = await fetch(`${API}/admin/withdrawals/${noteTargetId}/note`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-admin-secret': adminSecret },
        body: JSON.stringify({ admin_note: note })
        });
        const data = await res.json();
        if (data.success) {
        showToast('Note saved.', 'success');
        closeNoteModal();
        loadWithdrawals('pending');
        } else showToast(data.message || 'Failed.', 'error');
        } catch { showToast('Network error.', 'error'); }
        }

        // ── HELPERS ────────────────────────────────────────────
        function formatDate(d) {
        if (!d) return '—';
        return new Date(d).toLocaleDateString('en-KE', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
        }
        function formatDate2(d) {
        if (!d) return '—';
        return new Date(d).toLocaleDateString('en-KE', { day:'numeric', month:'short', year:'numeric' });
        }

        // ── INIT ───────────────────────────────────────────────
        window.onload = function () {
        loadLandlords();
        // Pre-fetch pending count for badge
        fetch(`${API}/admin/withdrawals?status=pending`, { headers: { 'x-admin-secret': adminSecret } })
        .then(r => r.json())
        .then(d => {
        if (d.success) {
        const n = (d.withdrawals || []).filter(w => w.status === 'pending').length;
        document.getElementById('tab-wd-count').textContent = n;
        }
        }).catch(() => {});
        };
    </script>
</body>
</html>
